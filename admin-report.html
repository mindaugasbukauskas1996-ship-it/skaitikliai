<!DOCTYPE html>

<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<title>Ataskaita — Skaitikliai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f0f2f7;--card:#fff;--border:#dde2ef;--text:#111827;--muted:#6b7280;--accent:#2563eb;--green:#16a34a;--red:#dc2626;--inp:#f8faff;--inp-b:#c7d2e8;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px;}
.hdr{background:#111827;color:#fff;padding:13px 14px 10px;position:sticky;top:0;z-index:300;}
.hdr h1{font-size:.95rem;font-weight:700;}
.hdr .sub{font-size:.68rem;color:#9ca3af;margin-top:1px;}
.wrap{padding:12px;}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.card h2{font-size:.85rem;font-weight:700;margin-bottom:10px;}
.fld{margin-bottom:10px;}
.fld label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:3px;font-weight:600;}
.fld select,.fld input{width:100%;border:1.5px solid var(--inp-b);border-radius:8px;padding:9px 10px;font-size:.88rem;color:var(--text);background:var(--inp);outline:none;}
.btn{width:100%;background:#111827;color:#fff;border:none;border-radius:9px;padding:12px;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:4px;display:block;text-align:center;}
.btn.green{background:var(--green);}
.btn:active{transform:scale(.98);}
.rep-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.rep-wrap h3{padding:10px 12px;font-size:.82rem;border-bottom:1px solid var(--border);background:#f9fafb;}
.rep-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.75rem;}
th{background:#111827;color:#fff;padding:7px 8px;text-align:left;white-space:nowrap;}
td{padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap;}
tr:nth-child(even) td{background:#f9fafb;}
.foot td{background:#111827;color:#fff;font-weight:700;}
.miss{color:var(--red);font-style:italic;}
.loading{padding:30px;text-align:center;color:var(--muted);}
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:0;z-index:300;display:flex;}
.btm-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:.67rem;font-weight:700;color:var(--muted);gap:2px;text-decoration:none;}
.btm-tab.on{color:#111827;}
</style>
</head>
<body>
<div class="hdr">
  <h1>📊 Ataskaitos</h1>
  <div class="sub">Pasirinkite parametrus</div>
</div>

<div class="wrap">
  <div class="card">
    <h2>Generuoti ataskaitą</h2>
    <div class="fld"><label>Adresas</label>
      <select id="rep-addr"><option value="">Visi adresai</option></select>
    </div>
    <div class="fld"><label>Mėnuo</label>
      <input type="month" id="rep-period"/>
    </div>
    <button class="btn" id="btn-gen">📊 Generuoti</button>
    <button class="btn green" id="btn-xls" style="margin-top:8px;">📄 Šilumos XLS</button>
  </div>
  <div id="rep-output"></div>
</div>

<div class="btm">
  <a href="index.html" class="btm-tab">🏠 Pradžia</a>
  <a href="admin.html" class="btm-tab">📋 Nurašymas</a>
  <a href="admin-report.html" class="btm-tab on">📊 Ataskaita</a>
</div>

<script>
const SB_URL='https://fkuyazgbjehqppmcmamw.supabase.co';
const SB_KEY='sb_publishable_PIjTvJ2COG3tG8WDSEguww_SsGFzB2B';
const MEN_GEN=['','sausio','vasario','kovo','balandžio','gegužės','birželio','liepos','rugpjūčio','rugsėjo','spalio','lapkričio','gruodžio'];

let addresses=[];

async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation'},
    method:opts.method||'GET',body:opts.body?JSON.stringify(opts.body):undefined
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return res.status===204?null:res.json();
}

function addrMeta(name){
  const n=(name||'').toLowerCase();
  if(n.includes('žemaitės g. 6')||n.includes('žemaitės g. 10'))return'elec';
  if(n.includes('karališkių'))return'water';
  return'heat';
}

async function init(){
  const now=new Date();
  document.getElementById('rep-period').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  try{
    addresses=await sbFetch('addresses?select=id,name&order=id');
    const sel=document.getElementById('rep-addr');
    addresses.forEach(a=>sel.innerHTML+=`<option value="${a.id}">${a.name}</option>`);
  }catch(e){}
  document.getElementById('btn-gen').addEventListener('click',generateReport);
  document.getElementById('btn-xls').addEventListener('click',exportXLS);
}

async function generateReport(){
  const addrId=document.getElementById('rep-addr').value;
  const period=document.getElementById('rep-period').value;
  if(!period){alert('Pasirinkite mėnesį!');return;}
  const[y,m]=period.split('-').map(Number);
  document.getElementById('rep-output').innerHTML='<div class="loading">Kraunama...</div>';
  try{
    let addrsToShow=addrId?addresses.filter(a=>a.id==addrId):addresses;
    let html='';
    let csvRows=[['Adresas','Butas','Abonento vardas','Tipas','NUO','IKI','Suvartota','Vnt.','Pastabos']];
    for(const addr of addrsToShow){
      const apts=await sbFetch(`apartments?select=id,number,tenant_name,apt_label&address_id=eq.${addr.id}&order=number`);
      if(!apts.length)continue;
      const aptIds=apts.map(a=>a.id).join(',');
      const ms=await sbFetch(`meters?select=id,apartment_id,meter_types(code,label,unit)&apartment_id=in.(${aptIds})`);
      const mIds=ms.map(m=>m.id).join(',');
      const readings=await sbFetch(`readings?select=meter_id,value_from,value_to,consumption,note&meter_id=in.(${mIds})&period=eq.${period}`);
      const readMap={};readings.forEach(r=>readMap[r.meter_id]=r);
      let totalCons=0;let rows='';
      apts.forEach(apt=>{
        const aptMs=ms.filter(m=>m.apartment_id===apt.id);
        const aptDisp=apt.apt_label||apt.number;
        const isE=aptMs.some(m=>m.meter_types.code.startsWith('electricity'));
        aptMs.forEach(m=>{const r=readMap[m.id];if(r)totalCons+=Number(r.consumption);
          csvRows.push([addr.name,aptDisp,apt.tenant_name||'',m.meter_types.label,r?r.value_from:'',r?r.value_to:'',r?Number(r.consumption):'',m.meter_types.unit,r?r.note||'':'Nenurašyta']);
        });
        if(isE){
          const dM=aptMs.find(m=>m.meter_types.code==='electricity_day');
          const nM=aptMs.find(m=>m.meter_types.code==='electricity_night');
          const rd=readMap[dM?.id];const rn=readMap[nM?.id];
          rows+=`<tr><td><b>${aptDisp}</b></td><td>${apt.tenant_name||'—'}</td>
            <td>${rd?rd.value_from:'<span class="miss">—</span>'}</td><td>${rd?rd.value_to:'<span class="miss">—</span>'}</td><td>${rd?Number(rd.consumption):'<span class="miss">—</span>'}</td>
            <td>${rn?rn.value_from:'<span class="miss">—</span>'}</td><td>${rn?rn.value_to:'<span class="miss">—</span>'}</td><td>${rn?Number(rn.consumption):'<span class="miss">—</span>'}</td>
            <td>${readMap[dM?.id]?.note||(!rd?'<span class="miss">Nenurašyta</span>':'')}</td></tr>`;
        }else{
          const r=readMap[aptMs[0]?.id];
          rows+=`<tr><td><b>${aptDisp}</b></td><td>${apt.tenant_name||'—'}</td>
            <td>${r?r.value_from:'<span class="miss">—</span>'}</td><td>${r?r.value_to:'<span class="miss">—</span>'}</td>
            <td>${r?Number(r.consumption):'<span class="miss">—</span>'}</td><td>${r?.note||(!r?'<span class="miss">Nenurašyta</span>':'')}</td></tr>`;
        }
      });
      const firstM=ms[0];const isE=firstM?.meter_types?.code?.startsWith('electricity');
      const unit=firstM?.meter_types?.unit||'kWh';
      const cols=isE?'<th>Nr.</th><th>Vardas</th><th>D.NUO</th><th>D.IKI</th><th>D.kWh</th><th>N.NUO</th><th>N.IKI</th><th>N.kWh</th><th>Pastabos</th>'
        :`<th>Nr.</th><th>Vardas</th><th>NUO</th><th>IKI</th><th>Suvartota (${unit})</th><th>Pastabos</th>`;
      html+=`<div class="rep-wrap"><h3>${addr.name} · ${MEN_GEN[m]} ${y} · ${totalCons.toFixed(1)} ${unit}</h3>
        <div class="rep-scroll"><table><thead><tr>${cols}</tr></thead><tbody>${rows}</tbody>
        <tr class="foot"><td colspan="${isE?8:4}">VISO</td><td>${totalCons.toFixed(1)} ${unit}</td><td></td></tr>
        </table></div></div>`;
    }
    html+=`<button class="btn" id="btn-csv" style="margin-bottom:12px;">📄 Eksportuoti CSV</button>`;
    document.getElementById('rep-output').innerHTML=html;
    document.getElementById('btn-csv').addEventListener('click',function(){exportCSV(csvRows,period);});
  }catch(e){document.getElementById('rep-output').innerHTML='<div class="loading">⚠ '+e.message+'</div>';}
}

function exportCSV(rows,period){
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(';')).join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='skaitikliai_'+period+'.csv';a.click();
}

async function exportXLS(){
  const addrId=document.getElementById('rep-addr').value;
  const period=document.getElementById('rep-period').value;
  if(!period){alert('Pasirinkite mėnesį!');return;}
  const[y,m]=period.split('-').map(Number);
  const menLabel=`${y} m. ${MEN_GEN[m]||m} mėn.`;
  let addrsToShow=addrId?addresses.filter(a=>a.id==addrId):addresses;
  addrsToShow=addrsToShow.filter(a=>addrMeta(a.name)==='heat');
  if(!addrsToShow.length){alert('Nėra šilumos skaitiklių!');return;}
  let allCsv='';
  for(const addr of addrsToShow){
    const apts=await sbFetch(`apartments?select=id&address_id=eq.${addr.id}&order=number`);
    if(!apts.length)continue;
    const ms=await sbFetch(`meters?select=id,apartment_id,meter_type_id,meter_serial,meter_types(code,label,unit)&apartment_id=in.(${apts.map(a=>a.id).join(',')})`);
    const mIds=ms.map(m=>m.id).join(',');
    const readings=await sbFetch(`readings?select=meter_id,value_from,value_to,consumption,note&meter_id=in.(${mIds})&period=eq.${period}`);
    const readMap={};readings.forEach(r=>readMap[r.meter_id]=r);
    const mwhM=ms.find(m=>m.meter_types.code==='heat_mwh');
    const m3M=ms.find(m=>m.meter_types.code==='heat_m3');
    const hM=ms.find(m=>m.meter_types.code==='heat_h');
    const wM=ms.find(m=>m.meter_types.code==='water_m3');
    const rMwh=readMap[mwhM?.id];const rM3=readMap[m3M?.id];const rH=readMap[hM?.id];const rW=readMap[wM?.id];
    allCsv+=`UAB "Mano Būstas Vakarai"\n${addr.name}\nAPSKAITOS PRIETAISŲ PARODYMAI ${menLabel}\n\n`;
    allCsv+=`Prietaiso pavadinimas;Mat. vnt.;mėn. pradž.;mėn. gale;skirtumas;Pastabos\n`;
    allCsv+=`Šilumos skaitiklis Gamykl. Nr. ${mwhM?.meter_serial||''};MWh/kWh;${rMwh?rMwh.value_from:''};${rMwh?rMwh.value_to:''};${rMwh?Number(rMwh.consumption):''};${rMwh?.note||''}\n`;
    allCsv+=`;m3;${rM3?rM3.value_from:''};${rM3?rM3.value_to:''};${rM3?Number(rM3.consumption):''}\n`;
    allCsv+=`;val;${rH?rH.value_from:''};${rH?rH.value_to:''};${rH?Number(rH.consumption):''}\n`;
    if(wM)allCsv+=`Vandens skaitiklis prieš boilerį gamyklinis nr. ${wM.meter_serial||''};m3;${rW?rW.value_from:''};${rW?rW.value_to:''};${rW?Number(rW.consumption):''}\n`;
    allCsv+=`\nDuomenų fiksavimo data: ${new Date().toLocaleDateString('lt-LT')}\n\n---\n\n`;
  }
  const b=new Blob(['\uFEFF'+allCsv],{type:'text/csv;charset=utf-8;'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download=`siluma_${period}.csv`;a.click();
}

init();
</script>

</body>
</html>
