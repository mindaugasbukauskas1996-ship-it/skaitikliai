<!DOCTYPE html>

<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nurašinėtojas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0f2f7;--card:#fff;--border:#dde2ef;--text:#111827;--muted:#6b7280;--green:#16a34a;--red:#dc2626;--inp:#f8faff;--inp-b:#c7d2e8;--accent:#2563eb;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);padding-bottom:20px;}
.hdr{background:#111827;color:#fff;padding:14px;position:sticky;top:0;z-index:99;}
.hdr h1{font-size:1rem;font-weight:700;}
.hdr p{font-size:.72rem;color:#9ca3af;margin-top:2px;}
.prog{height:3px;background:#374151;margin-top:8px;}
.prog-fill{height:100%;background:#3b82f6;transition:width .3s;}
#screen-list{padding:12px;}
#screen-fill{display:none;padding-bottom:12px;}
.period-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:58px;z-index:98;}
.period-bar a{background:#374151;color:#fff;border-radius:8px;padding:7px 12px;font-size:.8rem;font-weight:700;text-decoration:none;}
.period-bar span{font-size:.88rem;font-weight:700;}
.addr-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.addr-card:active{opacity:.8;}
.addr-icon{font-size:1.5rem;}
.addr-name{font-weight:700;font-size:.95rem;}
.addr-sub{font-size:.72rem;color:var(--muted);}
.section{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:10px 12px 4px;}
.apt-card{background:#fff;border:1px solid var(--border);border-radius:10px;margin:0 12px 8px;overflow:hidden;}
.apt-card.done{border-color:#86efac;}
.apt-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f9fafb;border-bottom:1px solid var(--border);}
.apt-card.done .apt-head{background:#f0fdf4;}
.apt-num{width:30px;height:30px;background:#111827;color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0;}
.apt-card.done .apt-num{background:var(--green);}
.apt-name{font-size:.82rem;font-weight:600;flex:1;}
.apt-status{font-size:.65rem;padding:3px 7px;border-radius:20px;font-weight:700;}
.apt-status.p{background:#fef3c7;color:#92400e;}
.apt-status.d{background:#dcfce7;color:#166534;}
.apt-body{padding:10px 12px;}
.bendras{background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:7px 10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.bendras span:first-child{font-size:.7rem;color:#1d4ed8;font-weight:600;}
.bendras span:last-child{font-size:.95rem;font-weight:700;color:#1d4ed8;}
.meter-sec{margin-bottom:8px;}
.meter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.meter-row{display:grid;grid-template-columns:1fr 1fr 44px;gap:6px;align-items:end;}
.fld label{font-size:.65rem;color:var(--muted);display:block;margin-bottom:2px;}
.fld input{width:100%;border:1.5px solid var(--inp-b);border-radius:7px;padding:9px 8px;font-size:.95rem;background:var(--inp);outline:none;font-family:monospace;-webkit-appearance:none;}
.fld input:focus{border-color:var(--accent);}
.fld input.pf{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;}
.fld input.err{border-color:var(--red);}
.chip{border-radius:6px;font-size:.7rem;font-weight:700;height:38px;display:flex;align-items:center;justify-content:center;}
.chip.pos{background:#dcfce7;color:#166534;}
.chip.neg{background:#fee2e2;color:#991b1b;}
.chip.zero{background:#f3f4f6;color:#6b7280;}
.note{width:100%;border:1.5px solid var(--inp-b);border-radius:7px;padding:7px 8px;font-size:.82rem;background:var(--inp);outline:none;resize:none;font-family:inherit;margin-top:6px;}
.apt-foot{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-top:1px solid var(--border);background:#fafbff;}
.apt-tot{font-size:.8rem;font-weight:700;}
.save-btn{background:#111827;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:.82rem;font-weight:700;min-height:42px;}
.save-btn.done{background:var(--green);}
.save-btn:disabled{background:#9ca3af;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 20px;border-radius:10px;font-size:.83rem;font-weight:700;z-index:999;display:none;}
.toast.ok{background:var(--green);}
.toast.er{background:var(--red);}
</style>
</head>
<body>

<div class="hdr">
  <h1 id="hdr-title">Skaitikliai</h1>
  <p id="hdr-sub">Pasirinkite adresą</p>
  <div class="prog"><div class="prog-fill" id="prog" style="width:0%"></div></div>
</div>

<div id="screen-list">
  <div style="padding:8px 0 4px;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Adresai</div>
  <div id="addr-list"><p style="padding:20px;color:var(--muted);">Kraunama...</p></div>
</div>

<div id="screen-fill">
  <div class="period-bar">
    <a href="#" id="btn-back">← Atgal</a>
    <span id="period-txt"></span>
  </div>
  <div class="section" id="fill-title"></div>
  <div id="apt-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var URL2 = 'https://fkuyazgbjehqppmcmamw.supabase.co/rest/v1/';
var KEY = 'sb_publishable_PIjTvJ2COG3tG8WDSEguww_SsGFzB2B';
var MEN = ['','sausis','vasaris','kovas','balandis','gegužė','birželis','liepa','rugpjūtis','rugsėjis','spalis','lapkritis','gruodis'];

var now = new Date();
var curYear = now.getFullYear();
var curMonth = now.getMonth() + 1;
var curPeriod = curYear + '-' + (curMonth < 10 ? '0' : '') + curMonth;
var periodTxt = MEN[curMonth] + ' ' + curYear;

var addresses = [];
var curAddr = null;
var apartments = [];
var meters = [];
var prevReadings = {};
var curReadings = {};

function api(path) {
  return fetch(URL2 + path, {
    headers: {
      'apikey': KEY,
      'Authorization': 'Bearer ' + KEY
    }
  }).then(function(r) {
    if (!r.ok) {
      return r.text().then(function(t) {
        throw new Error('API ' + r.status + ': ' + t);
      });
    }
    return r.json();
  });
}

function apiPost(path, data) {
  return fetch(URL2 + path, {
    method: 'POST',
    headers: {
      'apikey': KEY,
      'Authorization': 'Bearer ' + KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(data)
  }).then(function(r){ return r.json(); });
}

function apiPatch(path, data) {
  return fetch(URL2 + path, {
    method: 'PATCH',
    headers: {
      'apikey': KEY,
      'Authorization': 'Bearer ' + KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
}

function icon(name) {
  var n = name.toLowerCase();
  if (n.indexOf('žemaitės g. 6') >= 0 || n.indexOf('žemaitės g. 10') >= 0) return '⚡';
  if (n.indexOf('karališkių') >= 0) return '🔥';
  return '🌡️';
}

function loadAddresses() {
  api('addresses?select=id,name&order=id').then(function(data) {
    addresses = data;
    var html = '';
    data.forEach(function(a) {
      html += '<div class="addr-card" data-id="' + a.id + '">' +
        '<div class="addr-icon">' + icon(a.name) + '</div>' +
        '<div><div class="addr-name">' + a.name + '</div>' +
        '<div class="addr-sub">' + periodTxt + '</div></div>' +
        '</div>';
    });
    document.getElementById('addr-list').innerHTML = html;
    document.querySelectorAll('.addr-card').forEach(function(el) {
      el.addEventListener('click', function() {
        selectAddr(parseInt(this.dataset.id));
      });
    });
  }).catch(function(e) {
    document.getElementById('addr-list').innerHTML = '<p style="padding:20px;color:red;">Klaida: ' + e.message + '</p>';
  });
}

function selectAddr(id) {
  curAddr = null;
  addresses.forEach(function(a){ if(a.id === id) curAddr = a; });
  document.getElementById('screen-list').style.display = 'none';
  document.getElementById('screen-fill').style.display = 'block';
  document.getElementById('hdr-title').textContent = curAddr.name;
  document.getElementById('hdr-sub').textContent = periodTxt;
  document.getElementById('period-txt').textContent = periodTxt;
  document.getElementById('fill-title').textContent = 'Butai';
  document.getElementById('apt-list').innerHTML = '<p style="padding:20px;color:var(--muted);">Kraunama...</p>';

  api('apartments?select=id,number,tenant_name,apt_label&address_id=eq.' + id + '&order=number').then(function(apts) {
    apartments = apts;
    var aptIds = apts.map(function(a){ return a.id; }).join(',');
    return api('meters?select=id,apartment_id,meter_type_id,meter_serial,meter_types(code,label,unit)&apartment_id=in.(' + aptIds + ')');
  }).then(function(ms) {
    meters = ms;
    var mIds = ms.map(function(m){ return m.id; }).join(',');
    return api('readings?select=meter_id,value_to,period&meter_id=in.(' + mIds + ')&order=period.desc');
  }).then(function(allPrev) {
    prevReadings = {};
    allPrev.forEach(function(r) {
      if (prevReadings[r.meter_id] === undefined) prevReadings[r.meter_id] = r.value_to;
    });
    var mIds = meters.map(function(m){ return m.id; }).join(',');
    return api('readings?select=id,meter_id,value_from,value_to,note&meter_id=in.(' + mIds + ')&period=eq.' + curPeriod);
  }).then(function(curr) {
    curReadings = {};
    curr.forEach(function(r){ curReadings[r.meter_id] = r; });
    renderApts();
  }).catch(function(e) {
    document.getElementById('apt-list').innerHTML = '<p style="padding:20px;color:red;">Klaida: ' + e.message + '</p>';
  });
}

function renderApts() {
  var html = '';
  var total = apartments.length;
  var done = 0;

  apartments.forEach(function(apt) {
    var aptMs = meters.filter(function(m){ return m.apartment_id === apt.id; });
    var isSaved = aptMs.length > 0 && aptMs.every(function(m){ return curReadings[m.id]; });
    if (isSaved) done++;
    var lbl = apt.apt_label || apt.number;
    var isElec = aptMs.some(function(m){ return m.meter_types.code.indexOf('electricity') === 0; });
    var isHeat = aptMs.some(function(m){ return m.meter_types.code.indexOf('heat_') === 0; });

    html += '<div class="apt-card' + (isSaved ? ' done' : '') + '" id="apt-' + apt.id + '">';
    html += '<div class="apt-head">';
    html += '<div class="apt-num" id="num-' + apt.id + '">' + lbl + '</div>';
    html += '<div class="apt-name">' + (apt.tenant_name || 'Butas ' + lbl) + '</div>';
    html += '<div class="apt-status ' + (isSaved ? 'd' : 'p') + '" id="st-' + apt.id + '">' + (isSaved ? '✓ Atlikta' : 'Laukia') + '</div>';
    html += '</div>';
    html += '<div class="apt-body">';

    if (isElec) {
      var dayM = aptMs.find(function(m){ return m.meter_types.code === 'electricity_day'; });
      var nightM = aptMs.find(function(m){ return m.meter_types.code === 'electricity_night'; });
      var pd = prevReadings[dayM ? dayM.id : 0];
      var pn = prevReadings[nightM ? nightM.id : 0];
      if (pd !== undefined && pn !== undefined) {
        html += '<div class="bendras"><span>⚡ Bendras parodymas</span><span>' + (Number(pd) + Number(pn)) + ' kWh</span></div>';
      }
      html += meterRow('☀ Dieninis', dayM, isSaved);
      html += meterRow('🌙 Naktinis', nightM, isSaved);
    } else if (isHeat) {
      var mwhM = aptMs.find(function(m){ return m.meter_types.code === 'heat_mwh'; });
      var m3M = aptMs.find(function(m){ return m.meter_types.code === 'heat_m3'; });
      var hM = aptMs.find(function(m){ return m.meter_types.code === 'heat_h'; });
      var wM = aptMs.find(function(m){ return m.meter_types.code === 'water_m3'; });
      if (mwhM) html += meterRow('🌡️ MWh/kWh', mwhM, isSaved);
      if (m3M) html += meterRow('💧 m³', m3M, isSaved);
      if (hM) html += meterRow('⏱ val', hM, isSaved);
      if (wM) html += meterRow('💧 Vanduo m³', wM, isSaved);
    } else {
      aptMs.forEach(function(m) {
        html += meterRow(m.meter_types.label, m, isSaved);
      });
    }

    var savedNote = isSaved && aptMs[0] && curReadings[aptMs[0].id] ? (curReadings[aptMs[0].id].note || '') : '';
    html += '<textarea class="note" id="note-' + apt.id + '" rows="1" placeholder="Pastabos..."' + (isSaved ? ' disabled' : '') + '>' + savedNote + '</textarea>';
    html += '</div>';
    html += '<div class="apt-foot">';
    html += '<div class="apt-tot" id="tot-' + apt.id + '">—</div>';
    html += '<button class="save-btn' + (isSaved ? ' done' : '') + '" id="sbtn-' + apt.id + '" data-id="' + apt.id + '"' + (isSaved ? ' disabled' : '') + '>' + (isSaved ? '✓ Išsaugota' : 'Išsaugoti') + '</button>';
    html += '</div></div>';

});

document.getElementById(‘apt-list’).innerHTML = html;
updateProgress(done, total);

// attach events
apartments.forEach(function(apt) {
var aptMs = meters.filter(function(m){ return m.apartment_id === apt.id; });
var isSaved = aptMs.every(function(m){ return curReadings[m.id]; });
if (!isSaved) {
aptMs.forEach(function(m) {
var el = document.getElementById(‘iki-’ + m.id);
if (el) el.addEventListener(‘input’, function(){ calcChip(m.id); calcTotal(apt.id); });
});
var btn = document.getElementById(‘sbtn-’ + apt.id);
if (btn) btn.addEventListener(‘click’, function(){ saveApt(parseInt(this.dataset.id)); });
}
calcTotal(apt.id);
});
}

function meterRow(label, m, disabled) {
if (!m) return ‘’;
var prev = prevReadings[m.id] !== undefined ? prevReadings[m.id] : ‘’;
var curr = curReadings[m.id];
var val = curr ? curr.value_to : ‘’;
return ‘<div class="meter-sec">’ +
‘<div class="meter-lbl">’ + label + ‘</div>’ +
‘<div class="meter-row">’ +
‘<div class="fld"><label>NUO</label><input class="pf" type="number" id="nuo-' + m.id + '" value="' + prev + '" readonly></div>’ +
‘<div class="fld"><label>IKI</label><input type=“number” id=“iki-’ + m.id + ‘” value=”’ + val + ‘” inputmode=“decimal”’ + (disabled ? ’ disabled’ : ‘’) + ’ placeholder=“Įvesti…”></div>’ +
‘<div class="chip zero" id="chip-' + m.id + '">—</div>’ +
‘</div></div>’;
}

function calcChip(mId) {
var nuo = parseFloat(document.getElementById(‘nuo-’ + mId).value) || 0;
var ikiEl = document.getElementById(‘iki-’ + mId);
var chip = document.getElementById(‘chip-’ + mId);
var iki = parseFloat(ikiEl.value);
if (isNaN(iki)) { chip.textContent = ‘—’; chip.className = ‘chip zero’; return; }
var d = iki - nuo;
chip.textContent = (d >= 0 ? ‘+’ : ‘’) + d;
chip.className = ’chip ’ + (d < 0 ? ‘neg’ : d === 0 ? ‘zero’ : ‘pos’);
ikiEl.className = d < 0 ? ‘err’ : ‘’;
}

function calcTotal(aptId) {
var aptMs = meters.filter(function(m){ return m.apartment_id === aptId; });
var tot = 0; var ok = true;
aptMs.forEach(function(m) {
var nuo = parseFloat(document.getElementById(‘nuo-’ + m.id).value) || 0;
var iki = parseFloat(document.getElementById(‘iki-’ + m.id).value);
if (isNaN(iki)) { ok = false; return; }
tot += iki - nuo;
});
var unit = aptMs[0] ? aptMs[0].meter_types.unit : ‘kWh’;
document.getElementById(‘tot-’ + aptId).textContent = ok ? tot + ’ ’ + unit : ‘—’;
}

function saveApt(aptId) {
var apt = null;
apartments.forEach(function(a){ if(a.id === aptId) apt = a; });
var aptMs = meters.filter(function(m){ return m.apartment_id === aptId; });
var note = document.getElementById(‘note-’ + aptId).value || ‘’;
var inserts = [];
var ok = true;
aptMs.forEach(function(m) {
var nuo = parseFloat(document.getElementById(‘nuo-’ + m.id).value) || 0;
var iki = parseFloat(document.getElementById(‘iki-’ + m.id).value);
if (isNaN(iki)) { showToast(‘Įveskite visus parodymus!’, ‘er’); ok = false; return; }
if (iki < nuo) { showToast(‘Parodymas mažesnis!’, ‘er’); ok = false; return; }
inserts.push({ meter_id: m.id, period: curPeriod, value_from: nuo, value_to: iki, note: note });
});
if (!ok) return;

var btn = document.getElementById(‘sbtn-’ + aptId);
btn.textContent = ‘…’; btn.disabled = true;

var chain = Promise.resolve();
inserts.forEach(function(ins) {
chain = chain.then(function() {
var existing = curReadings[ins.meter_id];
if (existing) {
return apiPatch(‘readings?id=eq.’ + existing.id, { value_to: ins.value_to, note: ins.note });
} else {
return apiPost(‘readings’, ins).then(function(res) {
if (Array.isArray(res)) curReadings[ins.meter_id] = res[0];
});
}
});
});

chain.then(function() {
var lbl = apt.apt_label || apt.number;
document.getElementById(‘apt-’ + aptId).classList.add(‘done’);
document.getElementById(‘num-’ + aptId).style.background = ‘var(--green)’;
document.getElementById(‘st-’ + aptId).textContent = ‘✓ Atlikta’;
document.getElementById(‘st-’ + aptId).className = ‘apt-status d’;
btn.textContent = ‘✓ Išsaugota’; btn.classList.add(‘done’);
aptMs.forEach(function(m){ var el = document.getElementById(‘iki-’ + m.id); if(el) el.disabled = true; });
document.getElementById(‘note-’ + aptId).disabled = true;
var done = document.querySelectorAll(’.apt-card.done’).length;
updateProgress(done, apartments.length);
showToast(‘Butas ’ + lbl + ’ išsaugotas!’, ‘ok’);
}).catch(function(e) {
btn.textContent = ‘Išsaugoti’; btn.disabled = false;
showToast(’Klaida: ’ + e.message, ‘er’);
});
}

function updateProgress(done, total) {
var pct = total > 0 ? Math.round(done/total*100) : 0;
document.getElementById(‘prog’).style.width = pct + ‘%’;
document.getElementById(‘hdr-sub’).textContent = done + ‘/’ + total + ’ nurašyta · ’ + pct + ‘%’;
}

function showToast(msg, type) {
var t = document.getElementById(‘toast’);
t.textContent = msg; t.className = ‘toast ’ + (type||’’); t.style.display = ‘block’;
setTimeout(function(){ t.style.display = ‘none’; }, 2500);
}

document.getElementById(‘btn-back’).addEventListener(‘click’, function(e) {
e.preventDefault();
document.getElementById(‘screen-fill’).style.display = ‘none’;
document.getElementById(‘screen-list’).style.display = ‘block’;
document.getElementById(‘hdr-title’).textContent = ‘Skaitikliai’;
document.getElementById(‘hdr-sub’).textContent = ‘Pasirinkite adresą’;
});

loadAddresses();
</script>

</body>
</html>
