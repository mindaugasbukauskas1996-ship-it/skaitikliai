<!DOCTYPE html>

<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827">
<title>Admin — Skaitikliai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f0f2f7;--card:#fff;--border:#dde2ef;--text:#111827;--muted:#6b7280;--accent:#2563eb;--green:#16a34a;--red:#dc2626;--amber:#d97706;--inp:#f8faff;--inp-b:#c7d2e8;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px;}
.hdr{background:#111827;color:#fff;padding:13px 14px 10px;position:sticky;top:0;z-index:300;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hdr h1{font-size:.95rem;font-weight:700;line-height:1.2;}
.hdr .sub{font-size:.68rem;color:#9ca3af;margin-top:1px;}
.hdr-meta{text-align:right;font-size:.67rem;color:#9ca3af;}
.hdr-meta strong{display:block;color:#fff;font-size:1.2rem;font-weight:700;line-height:1;}
.prog-track{height:3px;background:#374151;border-radius:2px;margin-top:8px;overflow:hidden;}
.prog-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .4s;}
.prog-lbl{font-size:.62rem;color:#9ca3af;margin-top:2px;text-align:right;}
#view-fill{display:none;}
#view-select.active,#view-fill.active{display:block;}
.addr-grid{display:grid;gap:10px;padding:16px 12px;}
.addr-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:18px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.addr-card:active{transform:scale(.98);}
.addr-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.addr-icon.elec{background:#fef9c3;}.addr-icon.water{background:#dbeafe;}.addr-icon.heat{background:#fee2e2;}
.addr-name{font-size:1rem;font-weight:700;}.addr-sub{font-size:.75rem;color:var(--muted);margin-top:2px;}
.addr-prog{margin-left:auto;text-align:right;}.ap-num{font-size:1.1rem;font-weight:700;}.ap-lbl{font-size:.65rem;color:var(--muted);}
.period-bar{background:#fff;border-bottom:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:66px;z-index:200;}
.period-lbl{font-size:.88rem;font-weight:700;color:var(--text);padding:7px 12px;background:var(--inp);border:1.5px solid var(--inp-b);border-radius:8px;flex:1;}
.back-btn{display:flex;align-items:center;gap:5px;padding:7px 11px;background:#f3f4f6;border:1px solid var(--border);border-radius:8px;font-size:.8rem;font-weight:700;color:var(--text);cursor:pointer;text-decoration:none;}
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;position:sticky;top:110px;z-index:199;}
.toolbar .sw{flex:1;display:flex;align-items:center;background:var(--inp);border:1px solid var(--inp-b);border-radius:8px;padding:0 9px;gap:5px;}
.toolbar .sw input{flex:1;border:none;background:transparent;outline:none;font-size:.88rem;color:var(--text);padding:8px 0;}
.tbtn{padding:8px 10px;border:1px solid var(--inp-b);border-radius:8px;background:var(--inp);color:var(--muted);font-size:.74rem;font-weight:700;cursor:pointer;}
.tbtn.on{background:#111827;color:#fff;border-color:#111827;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px;}
.sc{background:#fff;border:1px solid var(--border);border-radius:9px;padding:8px 5px;text-align:center;}
.sc .sv{font-size:1.25rem;font-weight:700;line-height:1;}.sc .sl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.sc.bl .sv{color:var(--accent);}.sc.gr .sv{color:var(--green);}.sc.am .sv{color:var(--amber);}.sc.rd .sv{color:var(--red);}
.slbl{font-size:.66rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:6px 12px 2px;font-weight:700;}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;margin:0 10px 8px;overflow:hidden;}
.card.saved{border-color:#86efac;}.card.err{border-color:#fca5a5;}
.ch{display:flex;align-items:center;gap:9px;padding:10px 12px;background:#f9fafb;border-bottom:1px solid var(--border);}
.card.saved .ch{background:#f0fdf4;border-bottom-color:#bbf7d0;}.card.err .ch{background:#fff1f2;border-bottom-color:#fca5a5;}
.nbox{width:32px;height:32px;border-radius:7px;background:#111827;color:#fff;font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card.saved .nbox{background:var(--green);}.card.err .nbox{background:var(--red);}
.cname{font-size:.81rem;font-weight:600;flex:1;line-height:1.3;}
.cbdg{font-size:.65rem;padding:3px 7px;border-radius:20px;font-weight:700;flex-shrink:0;}
.cbdg.p{background:#fef3c7;color:#92400e;}.cbdg.d{background:#dcfce7;color:#166534;}
.cbody{padding:11px 12px;}
.single-row{display:grid;grid-template-columns:1fr 1fr 48px;gap:7px;align-items:end;}
.dual-sec{margin-bottom:10px;}.dsec-lbl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px;}
.dual-row{display:grid;grid-template-columns:1fr 1fr 48px;gap:7px;align-items:end;}
.bendras-box{display:flex;justify-content:space-between;align-items:center;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:7px 11px;margin-bottom:9px;}
.bb-lbl{font-size:.69rem;color:#1d4ed8;font-weight:600;}.bb-val{font-size:1rem;font-weight:700;color:#1d4ed8;}
.fld label{display:block;font-size:.66rem;color:var(--muted);margin-bottom:3px;font-weight:600;}
.fld input{width:100%;border:1.5px solid var(--inp-b);border-radius:8px;padding:10px 9px;font-size:1rem;color:var(--text);background:var(--inp);outline:none;font-family:'Courier New',monospace;-webkit-appearance:none;}
.fld input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fld input.pf{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;}.fld input.ei{border-color:var(--red);background:#fff1f2;}
.chip{font-size:.7rem;padding:0 4px;border-radius:7px;font-weight:700;text-align:center;height:40px;display:flex;align-items:center;justify-content:center;min-width:44px;}
.cp{background:#dcfce7;color:#166534;}.cn{background:#fee2e2;color:#991b1b;}.cz{background:#f3f4f6;color:#6b7280;}
.note-inp{width:100%;border:1.5px solid var(--inp-b);border-radius:8px;padding:7px 9px;font-size:.84rem;background:var(--inp);outline:none;font-family:inherit;resize:none;color:var(--text);margin-top:8px;}
.cf{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-top:1px solid var(--border);background:#fafbff;}
.tot-lbl{font-size:.7rem;color:var(--muted);}.tot-val{font-size:.95rem;font-weight:700;}
.sbtn{background:#111827;color:#fff;border:none;border-radius:9px;padding:10px 15px;font-size:.84rem;font-weight:700;cursor:pointer;min-height:44px;}
.sbtn:active{transform:scale(.97);}.sbtn.sv{background:var(--green);}.sbtn:disabled{background:#9ca3af;cursor:default;}
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:0;z-index:300;display:flex;}
.btm-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;font-size:.67rem;font-weight:700;color:var(--muted);gap:2px;border:none;background:none;text-decoration:none;}
.btm-tab.on{color:#111827;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:12px;color:var(--muted);font-size:.85rem;}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(8px);background:#111827;color:#fff;padding:10px 20px;border-radius:10px;font-size:.83rem;font-weight:700;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green);}.toast.er{background:var(--red);}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div><h1 id="hdr-title">Skaitiklių sistema</h1><div class="sub" id="hdr-sub">Pasirinkite adresą</div></div>
    <div class="hdr-meta"><strong id="hdr-done">—</strong>nurašyta</div>
  </div>
  <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0%"></div></div>
  <div class="prog-lbl" id="plbl"></div>
</div>

<div id="view-select" class="active">
  <div style="padding:14px 12px 4px;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;">Pasirinkite adresą</div>
  <div class="addr-grid" id="addr-grid"><div class="loading"><div class="spinner"></div>Kraunama...</div></div>
</div>

<div id="view-fill">
  <div class="period-bar">
    <a href="tech.html" class="back-btn">&#8592; Atgal</a>
    <div class="period-lbl" id="period-lbl">—</div>
  </div>
  <div class="toolbar">
    <div class="sw"><span style="color:#9ca3af;font-size:.82rem;">&#128269;</span><input type="search" id="search" placeholder="Vardas arba butas..." autocomplete="off"/></div>
    <button class="tbtn on" id="f-all">Visi</button>
    <button class="tbtn" id="f-pending">Liko</button>
    <button class="tbtn" id="f-done">Atlikta</button>
  </div>
  <div class="stats">
    <div class="sc bl"><div class="sv" id="s-tot">—</div><div class="sl">Butai</div></div>
    <div class="sc gr"><div class="sv" id="s-done">0</div><div class="sl">Atlikta</div></div>
    <div class="sc am"><div class="sv" id="s-left">—</div><div class="sl">Liko</div></div>
    <div class="sc rd"><div class="sv" id="s-err">0</div><div class="sl">Klaidos</div></div>
  </div>
  <div class="slbl">Butai</div>
  <div id="cards"></div>
</div>

<div class="btm">
  <a href="index.html" class="btm-tab">🏠 Pradžia</a>
  <a href="admin-report.html" class="btm-tab">📊 Ataskaita</a>
  <a href="admin.html" class="btm-tab">🔑 Admin</a>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://fkuyazgbjehqppmcmamw.supabase.co';
const SB_KEY='sb_publishable_PIjTvJ2COG3tG8WDSEguww_SsGFzB2B';
const MEN=['','sausis','vasaris','kovas','balandis','gegužė','birželis','liepa','rugpjūtis','rugsėjis','spalis','lapkritis','gruodis'];

let addresses=[],curAddr=null,curPeriod='',apartments=[],meters=[],prevReadings={},curReadings={},cFilter='all';

async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation'},
    method:opts.method||'GET',body:opts.body?JSON.stringify(opts.body):undefined
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return res.status===204?null:res.json();
}

function periodLabel(p){const[y,m]=p.split('-').map(Number);return MEN[m]+' '+y;}

function addrMeta(name){
  const n=(name||'').toLowerCase();
  if(n.includes('žemaitės g. 6')||n.includes('žemaitės g. 10'))return{icon:'⚡',type:'elec',sub:'Elektra (butai)'};
  if(n.includes('karališkių'))return{icon:'🔥',type:'water',sub:'Karštas vanduo (butai)'};
  return{icon:'🌡️',type:'heat',sub:'Šilumos skaitiklis'};
}

async function loadAddresses(){
  try{
    const raw=await sbFetch('addresses?select=id,name&order=id');
    const order=a=>{const t=addrMeta(a.name).type;return t==='elec'?0:t==='heat'?1:2;};
    addresses=raw.sort((a,b)=>order(a)-order(b));
    document.getElementById('addr-grid').innerHTML=addresses.map(a=>{
      const m=addrMeta(a.name);
      return`<div class="addr-card" data-id="${a.id}">
        <div class="addr-icon ${m.type}">${m.icon}</div>
        <div><div class="addr-name">${a.name}</div><div class="addr-sub">${m.sub}</div></div>
        <div class="addr-prog"><div class="ap-num">—</div><div class="ap-lbl">atlikta</div></div>
      </div>`;
    }).join('');
    document.querySelectorAll('.addr-card').forEach(el=>{
      el.addEventListener('click',function(){selectAddr(parseInt(this.dataset.id));});
    });
  }catch(e){document.getElementById('addr-grid').innerHTML='<div class="loading">⚠ '+e.message+'</div>';}
}

function selectAddr(addrId){
  curAddr=addresses.find(a=>a.id===addrId);
  document.getElementById('hdr-title').textContent=curAddr.name;
  document.getElementById('hdr-sub').textContent=curAddr.name+' · '+periodLabel(curPeriod);
  document.getElementById('period-lbl').textContent=periodLabel(curPeriod);
  document.getElementById('view-select').classList.remove('active');
  document.getElementById('view-fill').classList.add('active');
  loadFill();
}

async function loadFill(){
  document.getElementById('cards').innerHTML='<div class="loading"><div class="spinner"></div>Kraunama...</div>';
  curReadings={};
  try{
    apartments=await sbFetch(`apartments?select=id,number,tenant_name,apt_label&address_id=eq.${curAddr.id}&order=number`);
    if(!apartments.length){document.getElementById('cards').innerHTML='<div class="loading">Nėra butų</div>';return;}
    const aptIds=apartments.map(a=>a.id).join(',');
    meters=await sbFetch(`meters?select=id,apartment_id,meter_type_id,meter_serial,meter_types(code,label,unit)&apartment_id=in.(${aptIds})`);
    const mIds=meters.map(m=>m.id).join(',');
    const allPrev=await sbFetch(`readings?select=meter_id,value_to,period&meter_id=in.(${mIds})&order=period.desc`);
    prevReadings={};
    allPrev.forEach(r=>{if(prevReadings[r.meter_id]===undefined)prevReadings[r.meter_id]=r.value_to;});
    const curr=await sbFetch(`readings?select=id,meter_id,value_from,value_to,note&meter_id=in.(${mIds})&period=eq.${curPeriod}`);
    curr.forEach(r=>curReadings[r.meter_id]={...r});
    renderCards();
  }catch(e){document.getElementById('cards').innerHTML='<div class="loading">⚠ '+e.message+'</div>';}
}

function renderCards(){
  const container=document.getElementById('cards');
  container.innerHTML='';
  document.getElementById('s-tot').textContent=apartments.length;
  apartments.forEach(apt=>{
    const aptMeters=meters.filter(m=>m.apartment_id===apt.id);
    const isElec=aptMeters.some(m=>m.meter_types.code.startsWith('electricity'));
    const isHeat=aptMeters.some(m=>m.meter_types.code.startsWith('heat_'));
    const isSaved=aptMeters.length>0&&aptMeters.every(m=>curReadings[m.id]);
    const aptLabel=apt.apt_label||apt.number;
    const card=document.createElement('div');
    card.className='card'+(isSaved?' saved':'');
    card.id='c'+apt.id;
    card.dataset.name=(apt.tenant_name||'').toLowerCase()+' '+String(aptLabel).toLowerCase();

    let headHtml=`<div class="ch">
      <div class="nbox" id="nb-${apt.id}">${aptLabel}</div>
      <div class="cname">${apt.tenant_name||'Butas '+aptLabel}</div>
      <div class="cbdg ${isSaved?'d':'p'}" id="bdg-${apt.id}">${isSaved?'✓ Atlikta':'Laukia'}</div>
    </div>`;

    let bodyHtml='<div class="cbody">';
    const dis=isSaved?'disabled':'';

    if(isHeat){
      const mwhM=aptMeters.find(m=>m.meter_types.code==='heat_mwh');
      const m3M=aptMeters.find(m=>m.meter_types.code==='heat_m3');
      const hM=aptMeters.find(m=>m.meter_types.code==='heat_h');
      const wM=aptMeters.find(m=>m.meter_types.code==='water_m3');
      bodyHtml+=`<div class="dsec-lbl" style="margin-bottom:6px;">🌡️ Šilumos skaitiklis (Nr. ${mwhM?.meter_serial||''})</div>`;
      [{m:mwhM,label:'MWh/kWh',emoji:'🌡️'},{m:m3M,label:'m³',emoji:'💧'},{m:hM,label:'val',emoji:'⏱'}].forEach(({m,label,emoji})=>{
        if(!m)return;
        const prev=prevReadings[m.id]??'—';const curr=curReadings[m.id];
        bodyHtml+=`<div class="single-row" style="margin-bottom:7px;">
          <div class="fld"><label>${emoji} NUO (${label})</label><input class="pf" type="number" id="nuo-${m.id}" value="${prev}" readonly/></div>
          <div class="fld"><label>IKI ✏</label><input type="number" id="iki-${m.id}" placeholder="Įvesti..." inputmode="decimal" value="${curr?curr.value_to:''}" ${dis}/></div>
          <div class="chip cz" id="chip-${m.id}">—</div>
        </div>`;
        if(curr)calcChip(m.id,apt.id,true);
      });
      if(wM){
        const prev=prevReadings[wM.id]??'—';const curr=curReadings[wM.id];
        bodyHtml+=`<div class="dsec-lbl" style="margin:8px 0 5px;">💧 Vanduo (Nr. ${wM.meter_serial||''})</div>
        <div class="single-row" style="margin-bottom:7px;">
          <div class="fld"><label>NUO (m³)</label><input class="pf" type="number" id="nuo-${wM.id}" value="${prev}" readonly/></div>
          <div class="fld"><label>IKI ✏</label><input type="number" id="iki-${wM.id}" placeholder="Įvesti..." inputmode="decimal" value="${curr?curr.value_to:''}" ${dis}/></div>
          <div class="chip cz" id="chip-${wM.id}">—</div>
        </div>`;
        if(curr)calcChip(wM.id,apt.id,true);
      }
    } else if(isElec){
      const dayM=aptMeters.find(m=>m.meter_types.code==='electricity_day');
      const nightM=aptMeters.find(m=>m.meter_types.code==='electricity_night');
      const prevDay=prevReadings[dayM?.id]??'—';
      const prevNight=prevReadings[nightM?.id]??'—';
      const lastBendras=(prevDay!=='—'&&prevNight!=='—')?(Number(prevDay)+Number(prevNight)):'—';
      bodyHtml+=`<div class="bendras-box"><span class="bb-lbl">⚡ Bendras parodymas</span><span class="bb-val">${lastBendras} kWh</span></div>`;
      const dCurr=curReadings[dayM?.id];
      bodyHtml+=`<div class="dual-sec"><div class="dsec-lbl">☀ Dieninis</div>
      <div class="dual-row">
        <div class="fld"><label>NUO</label><input class="pf" type="number" id="nuo-${dayM.id}" value="${prevDay}" readonly/></div>
        <div class="fld"><label>IKI ✏</label><input type="number" id="iki-${dayM.id}" placeholder="Įvesti..." inputmode="decimal" value="${dCurr?dCurr.value_to:''}" ${dis}/></div>
        <div class="chip cz" id="chip-${dayM.id}">—</div>
      </div></div>`;
      const nCurr=curReadings[nightM?.id];
      bodyHtml+=`<div class="dual-sec"><div class="dsec-lbl">🌙 Naktinis</div>
      <div class="dual-row">
        <div class="fld"><label>NUO</label><input class="pf" type="number" id="nuo-${nightM.id}" value="${prevNight}" readonly/></div>
        <div class="fld"><label>IKI ✏</label><input type="number" id="iki-${nightM.id}" placeholder="Įvesti..." inputmode="decimal" value="${nCurr?nCurr.value_to:''}" ${dis}/></div>
        <div class="chip cz" id="chip-${nightM.id}">—</div>
      </div></div>`;
      if(dayM&&dCurr)calcChip(dayM.id,apt.id,true);
      if(nightM&&nCurr)calcChip(nightM.id,apt.id,true);
    } else {
      aptMeters.forEach(m=>{
        const prev=prevReadings[m.id]??'—';const unit=m.meter_types.unit;const curr=curReadings[m.id];
        bodyHtml+=`<div class="single-row" style="margin-bottom:8px;">
          <div class="fld"><label>NUO (${unit})</label><input class="pf" type="number" id="nuo-${m.id}" value="${prev}" readonly/></div>
          <div class="fld"><label>IKI ✏</label><input type="number" id="iki-${m.id}" placeholder="Įvesti..." inputmode="decimal" value="${curr?curr.value_to:''}" ${dis}/></div>
          <div class="chip cz" id="chip-${m.id}">—</div>
        </div>`;
        if(curr)calcChip(m.id,apt.id,true);
      });
    }

    const savedNote=isSaved?(curReadings[aptMeters[0]?.id]?.note||''):'';
    bodyHtml+=`<textarea class="note-inp" id="note-${apt.id}" placeholder="Pastabos..." rows="1" ${dis}>${savedNote}</textarea></div>`;

```
const unit=aptMeters[0]?.meter_types?.unit||'kWh';
const footHtml=`<div class="cf">
  <div><div class="tot-lbl">Suvartota</div><div class="tot-val" id="tot-${apt.id}">—</div></div>
  <button class="sbtn ${isSaved?'sv':''}" id="sbtn-${apt.id}" data-aptid="${apt.id}" ${isSaved?'disabled':''}>
    ${isSaved?'✓ Išsaugota':'Išsaugoti ✓'}
  </button></div>`;

card.innerHTML=headHtml+bodyHtml+footHtml;
container.appendChild(card);

// attach input events
aptMeters.forEach(m=>{
  const el=document.getElementById('iki-'+m.id);
  if(el&&!isSaved){
    el.addEventListener('input',function(){calcChip(m.id,apt.id,false);});
  }
});
// attach save button

function calcChip(meterId,aptId,silent){
const nuo=parseFloat(document.getElementById(‘nuo-’+meterId)?.value)||0;
const ikiEl=document.getElementById(‘iki-’+meterId);
if(!ikiEl)return;
const iki=parseFloat(ikiEl.value);
const chip=document.getElementById(‘chip-’+meterId);
if(!chip)return;
if(isNaN(iki)){chip.textContent=’—’;chip.className=‘chip cz’;return;}
const d=iki-nuo;
chip.textContent=(d>=0?’+’:’’)+d;
chip.className=’chip ’+(d<0?‘cn’:d===0?‘cz’:‘cp’);
ikiEl.classList.toggle(‘ei’,d<0);
if(!silent)updateTotal(aptId);
}

function updateTotal(aptId){
const aptM=meters.filter(m=>m.apartment_id===aptId);
let tot=0,valid=true;
aptM.forEach(m=>{
const nuo=parseFloat(document.getElementById(‘nuo-’+m.id)?.value)||0;
const iki=parseFloat(document.getElementById(‘iki-’+m.id)?.value);
if(isNaN(iki)){valid=false;return;}
tot+=iki-nuo;
});
const unit=aptM[0]?.meter_types?.unit||‘kWh’;
document.getElementById(‘tot-’+aptId).textContent=valid?tot+’ ‘+unit:’—’;
}

async function saveApt(aptId){
const apt=apartments.find(a=>a.id===aptId);
const aptM=meters.filter(m=>m.apartment_id===aptId);
const note=document.getElementById(‘note-’+aptId)?.value||’’;
const inserts=[];
for(const m of aptM){
const nuo=parseFloat(document.getElementById(‘nuo-’+m.id)?.value)||0;
const iki=parseFloat(document.getElementById(‘iki-’+m.id)?.value);
if(isNaN(iki)){showT(‘Įveskite visus parodymus!’,‘er’);return;}
if(iki<nuo){showT(‘Parodymas mažesnis už ankstesnį!’,‘er’);return;}
inserts.push({meter_id:m.id,period:curPeriod,value_from:nuo,value_to:iki,note});
}
const btn=document.getElementById(‘sbtn-’+aptId);
btn.textContent=’…’;btn.disabled=true;
try{
for(const ins of inserts){
const existing=curReadings[ins.meter_id];
if(existing){
await sbFetch(`readings?id=eq.${existing.id}`,{method:‘PATCH’,body:{value_to:ins.value_to,note:ins.note},prefer:‘return=minimal’});
curReadings[ins.meter_id]={…existing,value_to:ins.value_to,note:ins.note};
}else{
const[created]=await sbFetch(‘readings’,{method:‘POST’,body:ins});
curReadings[ins.meter_id]=created;
}
}
const card=document.getElementById(‘c’+aptId);
card.classList.add(‘saved’);
document.getElementById(‘nb-’+aptId).style.background=‘var(–green)’;
const bdg=document.getElementById(‘bdg-’+aptId);bdg.textContent=‘✓ Atlikta’;bdg.className=‘cbdg d’;
btn.textContent=‘✓ Išsaugota’;btn.classList.add(‘sv’);
aptM.forEach(m=>{const el=document.getElementById(‘iki-’+m.id);if(el)el.disabled=true;});
const noteEl=document.getElementById(‘note-’+aptId);if(noteEl)noteEl.disabled=true;
updateStats();
showT(‘Butas ‘+(apt.apt_label||apt.number)+’ išsaugotas!’,‘ok’);
}catch(e){btn.textContent=‘Išsaugoti ✓’;btn.disabled=false;showT(’Klaida: ’+e.message,‘er’);}
}

function updateStats(){
const total=apartments.length;
const done=apartments.filter(a=>meters.filter(m=>m.apartment_id===a.id).every(m=>curReadings[m.id])).length;
const pct=total>0?Math.round(done/total*100):0;
document.getElementById(‘s-tot’).textContent=total;
document.getElementById(‘s-done’).textContent=done;
document.getElementById(‘s-left’).textContent=total-done;
document.getElementById(‘s-err’).textContent=document.querySelectorAll(’.card.err’).length;
document.getElementById(‘hdr-done’).textContent=done+’/’+total;
document.getElementById(‘pfill’).style.width=pct+’%’;
document.getElementById(‘plbl’).textContent=pct+’% atlikta’;
}

let cFilter=‘all’;
function setF(f,btn){
cFilter=f;
document.querySelectorAll(’.tbtn’).forEach(b=>b.classList.remove(‘on’));
btn.classList.add(‘on’);applyF();
}
function applyF(){
const q=document.getElementById(‘search’).value.toLowerCase();
document.querySelectorAll(’.card’).forEach(c=>{
const mq=!q||c.dataset.name.includes(q);
const isSaved=c.classList.contains(‘saved’);
const mf=cFilter===‘all’||(cFilter===‘done’&&isSaved)||(cFilter===‘pending’&&!isSaved);
c.classList.toggle(‘hidden’,!(mq&&mf));
});
}

function showT(msg,type){
const t=document.getElementById(‘toast’);
t.textContent=msg;t.className=‘toast ‘+(type||’’)+’ show’;
setTimeout(()=>t.classList.remove(‘show’),2400);
}

// INIT
const now=new Date();
curPeriod=now.getFullYear()+’-’+String(now.getMonth()+1).padStart(2,‘0’);
document.getElementById(‘f-all’).addEventListener(‘click’,function(){setF(‘all’,this);});
document.getElementById(‘f-pending’).addEventListener(‘click’,function(){setF(‘pending’,this);});
document.getElementById(‘f-done’).addEventListener(‘click’,function(){setF(‘done’,this);});
document.getElementById(‘search’).addEventListener(‘input’,applyF);
loadAddresses();
</script>
