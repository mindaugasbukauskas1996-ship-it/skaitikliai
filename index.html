<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skaitikliai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0f2f7;--card:#fff;--border:#dde2ef;--text:#111827;--muted:#6b7280;
  --green:#16a34a;--red:#dc2626;--blue:#2563eb;--amber:#d97706;
  --inp:#f8faff;--inp-b:#c7d2e8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── HEADER ── */
.hdr{background:#111827;color:#fff;padding:13px 14px 10px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr h1{font-size:.98rem;font-weight:700;line-height:1.2;}
.hdr .sub{font-size:.7rem;color:#9ca3af;margin-top:2px;}
.hdr-right{text-align:right;font-size:.68rem;color:#9ca3af;flex-shrink:0;}
.hdr-right strong{display:block;font-size:1.15rem;color:#fff;font-weight:700;line-height:1;}
.role-badge{font-size:.6rem;background:#374151;color:#9ca3af;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:3px;}
.role-badge.admin{background:#1e3a5f;color:#93c5fd;}
.prog-track{height:3px;background:#374151;border-radius:2px;margin-top:8px;overflow:hidden;}
.prog-fill{height:100%;background:#3b82f6;border-radius:2px;transition:width .3s;}
.prog-lbl{font-size:.62rem;color:#9ca3af;margin-top:2px;text-align:right;}

/* ── SCREENS ── */
.screen{display:none;}
.screen.active{display:block;}

/* ── ROLE SCREEN ── */
#screen-role.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:32px 24px;}
.role-logo{font-size:3.5rem;margin-bottom:14px;}
.role-title{font-size:1.25rem;font-weight:700;margin-bottom:6px;}
.role-sub{font-size:.85rem;color:var(--muted);margin-bottom:36px;}
.role-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:280px;}
.role-btn{display:block;width:100%;padding:22px 24px;background:#1f2937;color:#fff;font-size:1.05rem;font-weight:700;border-radius:16px;text-align:center;border:2px solid #374151;cursor:pointer;min-height:44px;font-family:inherit;}
.role-btn:active{background:#374151;transform:scale(.98);}

/* ── ADDRESS LIST ── */
.screen-pad{padding:12px;padding-bottom:16px;}
.section-lbl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:10px 12px 4px;}
.addr-grid{display:grid;gap:10px;padding:4px 12px 16px;}
.addr-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:14px;min-height:44px;transition:border-color .15s;}
.addr-card:active{transform:scale(.98);}
.addr-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.addr-icon.elec{background:#fef9c3;}
.addr-icon.heat{background:#fee2e2;}
.addr-icon.water{background:#dbeafe;}
.addr-name{font-size:.97rem;font-weight:700;}
.addr-sub{font-size:.73rem;color:var(--muted);margin-top:2px;}
.addr-prog{margin-left:auto;text-align:right;flex-shrink:0;}
.addr-prog-num{font-size:1.05rem;font-weight:700;}
.addr-prog-lbl{font-size:.63rem;color:var(--muted);}

/* ── PERIOD BAR ── */
.period-bar{background:#fff;border-bottom:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:62px;z-index:190;}
.period-lbl{font-size:.9rem;font-weight:700;flex:1;}
.period-inp{flex:1;border:1.5px solid var(--inp-b);border-radius:8px;padding:8px 10px;font-size:.9rem;font-weight:700;background:var(--inp);outline:none;color:var(--text);font-family:inherit;cursor:pointer;}
.period-inp:focus{border-color:var(--blue);}
.back-btn{padding:9px 13px;background:#f3f4f6;border:1px solid var(--border);border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;min-height:44px;font-family:inherit;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 10px;}
.stat-cell{background:#fff;border:1px solid var(--border);border-radius:9px;padding:8px 5px;text-align:center;}
.stat-num{font-size:1.2rem;font-weight:700;line-height:1;}
.stat-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-top:2px;}
.stat-cell.bl .stat-num{color:var(--blue);}
.stat-cell.gr .stat-num{color:var(--green);}
.stat-cell.am .stat-num{color:var(--amber);}

/* ── FILTER TOOLBAR ── */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;}
.tbtn{flex:1;padding:9px 6px;border:1px solid var(--inp-b);border-radius:8px;background:var(--inp);color:var(--muted);font-size:.78rem;font-weight:700;cursor:pointer;min-height:44px;font-family:inherit;}
.tbtn.on{background:#111827;color:#fff;border-color:#111827;}

/* ── APARTMENT CARDS ── */
.apt-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;margin:0 10px 10px;overflow:hidden;}
.apt-card.done{border-color:#86efac;}
.apt-head{display:flex;align-items:center;gap:9px;padding:10px 12px;background:#f9fafb;border-bottom:1px solid var(--border);}
.apt-card.done .apt-head{background:#f0fdf4;border-bottom-color:#bbf7d0;}
.apt-num{width:32px;height:32px;background:#111827;color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;}
.apt-card.done .apt-num{background:var(--green);}
.apt-name{font-size:.82rem;font-weight:600;flex:1;line-height:1.3;}
.apt-badge{font-size:.65rem;padding:3px 8px;border-radius:20px;font-weight:700;flex-shrink:0;}
.apt-badge.p{background:#fef3c7;color:#92400e;}
.apt-badge.d{background:#dcfce7;color:#166534;}
.edit-btn{padding:7px 11px;background:#f59e0b;color:#fff;border:none;border-radius:7px;font-size:.75rem;font-weight:700;cursor:pointer;min-height:44px;font-family:inherit;flex-shrink:0;}

/* ── APARTMENT BODY ── */
.apt-body{padding:10px 12px;}
.bendras-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.bendras-lbl{font-size:.72rem;color:#1d4ed8;font-weight:600;}
.bendras-val{font-size:.98rem;font-weight:700;color:#1d4ed8;}
.meter-sec{margin-bottom:10px;}
.meter-lbl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:5px;}
.meter-row{display:grid;grid-template-columns:1fr 1fr 48px;gap:6px;align-items:end;}
.fld label{display:block;font-size:.66rem;color:var(--muted);margin-bottom:3px;font-weight:600;}
.fld input{width:100%;border:1.5px solid var(--inp-b);border-radius:8px;padding:10px 9px;font-size:1rem;background:var(--inp);outline:none;font-family:'Courier New',monospace;-webkit-appearance:none;color:var(--text);}
.fld input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fld input.pf{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;}
.fld input.ei{border-color:var(--red);background:#fff1f2;}
.chip{border-radius:7px;font-size:.72rem;font-weight:700;height:40px;display:flex;align-items:center;justify-content:center;min-width:44px;padding:0 3px;}
.chip.pos{background:#dcfce7;color:#166534;}
.chip.neg{background:#fee2e2;color:#991b1b;}
.chip.zero{background:#f3f4f6;color:#6b7280;}
.note-inp{width:100%;border:1.5px solid var(--inp-b);border-radius:8px;padding:8px 10px;font-size:.9rem;background:var(--inp);outline:none;resize:none;font-family:inherit;color:var(--text);margin-top:8px;min-height:40px;}
.note-inp:focus{border-color:var(--blue);}

/* ── APARTMENT FOOTER ── */
.apt-foot{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-top:1px solid var(--border);background:#fafbff;}
.apt-tot{font-size:.82rem;font-weight:700;}
.save-btn{background:#111827;color:#fff;border:none;border-radius:9px;padding:10px 16px;font-size:.84rem;font-weight:700;cursor:pointer;min-height:44px;font-family:inherit;}
.save-btn.done{background:var(--green);}
.save-btn:disabled{background:#9ca3af;cursor:default;}

/* ── BOTTOM NAV ── */
.btm{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:200;}
.btm-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px;cursor:pointer;font-size:.67rem;font-weight:700;color:var(--muted);gap:2px;border:none;background:none;min-height:56px;font-family:inherit;}
.btm-tab .ti{font-size:1.25rem;}
.btm-tab.on{color:#111827;}
.btm-spacer{height:68px;}

/* ── REPORT ── */
.report-wrap{padding:12px;}
.rep-controls{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.rep-controls-title{font-size:.88rem;font-weight:700;margin-bottom:10px;}
.rc-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.rc-fld label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:3px;font-weight:600;}
.rc-fld select,.rc-fld input[type=month],.rc-fld input[type=number]{width:100%;border:1.5px solid var(--inp-b);border-radius:8px;padding:9px 10px;font-size:.88rem;color:var(--text);background:var(--inp);outline:none;font-family:inherit;}
.calc-summary{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 14px;font-size:.8rem;background:#f9fafb;border-bottom:1px solid var(--border);}
.calc-summary b{color:var(--text);}
.rep-table tfoot td{background:#111827;color:#fff;font-weight:700;padding:8px 10px;}
.gen-btn{width:100%;background:#111827;color:#fff;border:none;border-radius:9px;padding:12px;font-size:.9rem;font-weight:700;cursor:pointer;min-height:44px;font-family:inherit;margin-top:4px;}
.rep-table-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.rep-table-title{padding:10px 14px;font-size:.84rem;font-weight:700;border-bottom:1px solid var(--border);background:#f9fafb;}
.rep-scroll{overflow-x:auto;}
.rep-table{width:100%;border-collapse:collapse;font-size:.77rem;}
.rep-table th{background:#111827;color:#fff;padding:8px 10px;text-align:left;white-space:nowrap;font-weight:600;}
.rep-table td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;}
.rep-table tr:last-child td{border-bottom:none;}
.rep-table tr:nth-child(even) td{background:#f9fafb;}
.missing{color:var(--red);font-style:italic;}
.exp-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;background:#16a34a;color:#fff;border:none;border-radius:9px;padding:12px;font-size:.88rem;font-weight:700;cursor:pointer;min-height:44px;font-family:inherit;margin-top:4px;}

/* ── LOADING / TOAST ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px;color:var(--muted);font-size:.88rem;}
.spinner{width:28px;height:28px;border:3px solid #e5e7eb;border-top-color:#2563eb;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(8px);background:#111827;color:#fff;padding:10px 20px;border-radius:10px;font-size:.83rem;font-weight:700;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;max-width:92vw;text-align:center;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{background:var(--green);}
.toast.er{background:var(--red);}
.hidden{display:none!important;}
/* ── HEATING ROOM CARDS ───────────────────────────── */
.apt-heat-card{background:#fff;border:1.5px solid var(--border);border-radius:10px;margin:0 0 8px;overflow:hidden;}
.apt-heat-hdr{background:#f9fafb;border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.apt-heat-hdr b{font-size:.9rem;}
.kv-badge{margin-left:auto;font-size:.75rem;color:var(--blue);font-weight:700;background:#eff6ff;padding:3px 8px;border-radius:6px;}
.heat-room-tbl{width:100%;border-collapse:collapse;font-size:.82rem;}
.heat-room-tbl th{background:#f3f4f6;padding:5px 8px;text-align:left;font-size:.7rem;color:var(--muted);font-weight:700;white-space:nowrap;}
.heat-room-tbl td{padding:4px 8px;border-top:1px solid var(--border);}
.heat-room-tbl input{width:88px;padding:5px 6px;border:1.5px solid var(--inp-b);border-radius:6px;font-size:.9rem;background:var(--inp);font-family:'Courier New',monospace;}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="hdr" id="hdr">
  <div class="hdr-row">
    <div>
      <h1 id="hdr-title">Skaitikliai</h1>
      <div class="sub" id="hdr-sub">Pasirinkite vartotoj&#x0105;</div>
    </div>
    <div class="hdr-right hidden" id="hdr-right">
      <strong id="hdr-done">&#8212;</strong>nura&#353;yta
      <div class="role-badge" id="role-badge"></div>
    </div>
  </div>
  <div class="prog-track hidden" id="prog-track">
    <div class="prog-fill" id="prog-fill" style="width:0%"></div>
  </div>
  <div class="prog-lbl hidden" id="prog-lbl"></div>
</div>

<!-- ── SCREEN: ROLE ── -->
<div id="screen-role" class="screen active">
  <div class="role-logo">&#x26A1;</div>
  <div class="role-title">Skaiklių sistema</div>
  <div class="role-sub">Pasirinkite vartotoją</div>
  <div class="role-btns">
    <button class="role-btn" id="btn-tech">&#x1F4CB; Nurašinėtojas</button>
    <button class="role-btn" id="btn-admin">&#x1F511; Administratorius</button>
  </div>
</div>

<!-- ── SCREEN: ADDRESSES ── -->
<div id="screen-addresses" class="screen">
  <div class="section-lbl" id="addr-period-lbl"></div>
  <div class="addr-grid" id="addr-grid">
    <div class="loading"><div class="spinner"></div>Kraunama...</div>
  </div>
  <div class="btm-spacer hidden" id="addr-spacer"></div>
</div>

<!-- ── SCREEN: APARTMENTS ── -->
<div id="screen-apartments" class="screen">
  <div class="period-bar">
    <button class="back-btn" id="btn-back">&#8592; Atgal</button>
    <div class="period-lbl" id="apts-period-lbl"></div>
  </div>
  <div class="stats">
    <div class="stat-cell bl"><div class="stat-num" id="s-tot">&#8212;</div><div class="stat-lbl">Butai</div></div>
    <div class="stat-cell gr"><div class="stat-num" id="s-done">0</div><div class="stat-lbl">Atlikta</div></div>
    <div class="stat-cell am"><div class="stat-num" id="s-left">&#8212;</div><div class="stat-lbl">Liko</div></div>
  </div>
  <div class="toolbar">
    <button class="tbtn on" id="f-all">Visi</button>
    <button class="tbtn" id="f-pending">Liko</button>
    <button class="tbtn" id="f-done">Atlikta</button>
  </div>
  <div class="section-lbl">Butai</div>
  <div id="apt-list">
    <div class="loading"><div class="spinner"></div>Kraunama...</div>
  </div>
  <div class="btm-spacer hidden" id="apts-spacer"></div>
</div>

<!-- ── SCREEN: REPORT (admin) ── -->
<div id="screen-report" class="screen">
  <div class="report-wrap">
    <div class="rep-controls">
      <div class="rep-controls-title">&#x1F4CA; Ataskaitos generavimas</div>
      <div class="rc-row">
        <div class="rc-fld">
          <label>Adresas</label>
          <select id="rep-addr"><option value="">Visi adresai</option></select>
        </div>
        <div class="rc-fld">
          <label>Mėnuo</label>
          <input type="month" id="rep-month" />
        </div>
      </div>
      <button class="gen-btn" id="btn-genrep">&#x1F4CA; Generuoti ataskaitą</button>
    </div>
    <div id="rep-output"></div>
  </div>
  <div class="btm-spacer"></div>
</div>

<!-- ── SCREEN: ELECTRICITY CALCULATOR (admin) ── -->
<div id="screen-calc" class="screen">
  <div class="report-wrap">
    <div class="rep-controls">
      <div class="rep-controls-title">&#x26A1; Elektros skaičiuoklė</div>
      <div class="rc-row">
        <div class="rc-fld">
          <label>Adresas</label>
          <select id="calc-addr"></select>
        </div>
        <div class="rc-fld">
          <label>Mėnuo</label>
          <input type="month" id="calc-month" />
        </div>
      </div>
      <div class="rc-row">
        <div class="rc-fld">
          <label>Bendra elektra (kWh)</label>
          <input type="number" id="calc-total-kwh" placeholder="pvz. 1042" inputmode="decimal" step="any" />
        </div>
        <div class="rc-fld">
          <label>Elektros kaina (EUR/kWh)</label>
          <input type="number" id="calc-price" placeholder="pvz. 0.24" inputmode="decimal" step="any" />
        </div>
      </div>
      <div class="rc-row">
        <div class="rc-fld">
          <label>kWh/m³ karštam vandeniui</label>
          <input type="number" id="calc-kwh-m3" value="15" inputmode="decimal" step="any" />
        </div>
      </div>
      <button class="gen-btn" id="btn-calc">&#x1F504; Krauti rodmenis</button>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
        <div class="rc-fld">
          <label>&#x1F511; Anthropic API raktas (šildymui iš foto)</label>
          <input type="password" id="calc-ai-key" placeholder="sk-ant-..." style="font-size:.85rem;" />
        </div>
      </div>
    </div>
    <div id="calc-output"></div>
  </div>
  <div class="btm-spacer"></div>
</div>

<!-- ── BOTTOM NAV (admin) ── -->
<div class="btm hidden" id="btm-nav">
  <button class="btm-tab on" id="tab-home">
    <span class="ti">&#x1F3E0;</span>Nurašymas
  </button>
  <button class="btm-tab" id="tab-report">
    <span class="ti">&#x1F4CA;</span>Ataskaita
  </button>
  <button class="btm-tab" id="tab-calc">
    <span class="ti">&#x26A1;</span>Elektra
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
/* ======================================================
   SKAITIKLIAI — Meter Reading App
   fetch().then() only, no async/await, no ES6 modules
   ====================================================== */

var SB_URL = 'https://fkuyazgbjehqppmcmamw.supabase.co';
var SB_KEY = 'sb_publishable_PIjTvJ2COG3tG8WDSEguww_SsGFzB2B';

var MEN = ['','sausis','vasaris','kovas','balandis','gegužė','birželis',
           'liepa','rugpjūtis','rugsėjis','spalis','lapkritis','gruodis'];

var ROOM_NAMES       = ['Svetainė','Miegamasis','San. mazgas','Miegamasis 2'];
var DIRECT_HEAT_RATIO = 0.7;

/* current period */
var _now = new Date();
var CUR_PERIOD = _now.getFullYear() + '-' + (_now.getMonth() + 1 < 10 ? '0' : '') + (_now.getMonth() + 1);
var CUR_LABEL  = MEN[_now.getMonth() + 1] + ' ' + _now.getFullYear();

/* state */
var userRole       = sessionStorage.getItem('skRole') || null;
var selAddr        = null;   /* {id, name} */
var addrList       = [];
var aptList        = [];
var meterList      = [];
var prevR          = {};     /* meter_id -> value_to (most recent any period) */
var curR           = {};     /* meter_id -> reading row for CUR_PERIOD */
var curFilter      = 'all';
var activePeriod   = CUR_PERIOD;  /* can be changed by admin */

/* ── SUPABASE HELPERS ─────────────────────────────── */
function sbHead() {
  return { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };
}

function sbGet(path) {
  return fetch(SB_URL + '/rest/v1/' + path, { headers: sbHead() })
    .then(function(r) {
      if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); }
      return r.json();
    });
}

function sbPost(path, body) {
  var h = sbHead();
  h['Content-Type'] = 'application/json';
  h['Prefer'] = 'return=representation';
  return fetch(SB_URL + '/rest/v1/' + path, { method: 'POST', headers: h, body: JSON.stringify(body) })
    .then(function(r) {
      if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); }
      return r.json();
    });
}

function sbPatch(path, body) {
  var h = sbHead();
  h['Content-Type'] = 'application/json';
  h['Prefer'] = 'return=minimal';
  return fetch(SB_URL + '/rest/v1/' + path, { method: 'PATCH', headers: h, body: JSON.stringify(body) })
    .then(function(r) {
      if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); }
      return null;
    });
}

function sbUpsert(path, body) {
  var h = sbHead();
  h['Content-Type'] = 'application/json';
  h['Prefer'] = 'resolution=merge-duplicates,return=minimal';
  return fetch(SB_URL + '/rest/v1/' + path, { method: 'POST', headers: h, body: JSON.stringify(body) })
    .then(function(r) {
      if (!r.ok) { return r.text().then(function(t) { throw new Error(t); }); }
      return null;
    });
}

/* ── UTILITIES ────────────────────────────────────── */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getPrevMonth(ym) {
  var p = ym.split('-'); var y = parseInt(p[0]); var m = parseInt(p[1]);
  if (m === 1) { y--; m = 12; } else { m--; }
  return y + '-' + (m < 10 ? '0' + m : String(m));
}

function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '') + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.classList.remove('show'); }, 2600);
}

function showScreen(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) { all[i].classList.remove('active'); }
  document.getElementById(id).classList.add('active');
}

function setHdr(title, sub, showRight, showProg) {
  document.getElementById('hdr-title').textContent = title;
  document.getElementById('hdr-sub').textContent   = sub;
  var right = document.getElementById('hdr-right');
  var track = document.getElementById('prog-track');
  var lbl   = document.getElementById('prog-lbl');
  if (showRight) { right.classList.remove('hidden'); } else { right.classList.add('hidden'); }
  if (showProg)  { track.classList.remove('hidden'); lbl.classList.remove('hidden'); }
  else           { track.classList.add('hidden');    lbl.classList.add('hidden'); }
}

/* ── ADDRESS LIST ─────────────────────────────────── */
function addrMeta(name) {
  var n = (name || '').toLowerCase();
  /* electricity: Žemaitės g. pattern */
  if (n.indexOf('žemait') >= 0 || n.indexOf('zemait') >= 0) {
    return { type: 'elec', sort: 0, icon: '⚡', sub: 'Elektros skaitikliai' };
  }
  /* water/hot-water: Karališkių pattern */
  if (n.indexOf('karalisk') >= 0 || n.indexOf('karališ') >= 0) {
    return { type: 'water', sort: 2, icon: '💧', sub: 'Vandens skaitikliai' };
  }
  /* default: heat */
  return { type: 'heat', sort: 1, icon: '🌡️', sub: 'Šilumos skaitikliai' };
}

function goToAddresses() {

/* ── OPEN ADDRESS → APARTMENTS ───────────────────── */
function periodToLabel(p) {
  var parts = p.split('-');
  var m = parseInt(parts[1], 10);
  return MEN[m] + ' ' + parts[0];
}

function openAddress(addr) {
  selAddr       = addr;
  aptList       = [];
  meterList     = [];
  prevR         = {};
  curR          = {};
  curFilter     = 'all';
  activePeriod  = CUR_PERIOD;

  showScreen('screen-apartments');
  setHdr(addr.name, periodToLabel(activePeriod), true, true);
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('prog-lbl').textContent  = '';
  document.getElementById('apt-list').innerHTML    =
    '<div class="loading"><div class="spinner"></div>Kraunama...</div>';

  /* period bar: admin gets editable month input, tech gets plain label */
  var pLbl = document.getElementById('apts-period-lbl');
  if (userRole === 'admin') {
    var inp = document.createElement('input');
    inp.type      = 'month';
    inp.id        = 'period-picker';
    inp.className = 'period-inp';
    inp.value     = activePeriod;
    inp.addEventListener('change', function() {
      if (this.value) changeActivePeriod(this.value);
    });
    pLbl.parentNode.replaceChild(inp, pLbl);
  } else {
    /* ensure it's a div (may have been replaced by input on prev visit) */
    if (pLbl.tagName !== 'DIV') {
      var div = document.createElement('div');
      div.className = 'period-lbl';
      div.id        = 'apts-period-lbl';
      pLbl.parentNode.replaceChild(div, pLbl);
      pLbl = div;
    }
    pLbl.textContent = periodToLabel(activePeriod);
  }

  resetFilterBtns();
  if (userRole === 'admin') { setActiveTab('tab-home'); }

  loadApts(addr.id);
}

function changeActivePeriod(period) {
  activePeriod = period;
  setHdr(selAddr.name, periodToLabel(activePeriod), true, true);
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('prog-lbl').textContent  = '';
  document.getElementById('apt-list').innerHTML    =
    '<div class="loading"><div class="spinner"></div>Kraunama...</div>';
  prevR = {};
  curR  = {};
  resetFilterBtns();
  curFilter = 'all';
  loadApts(selAddr.id);
}

function goBack() {
  goToAddresses();
}

/* ── LOAD APARTMENTS DATA ─────────────────────────── */
function loadApts(addrId) {
  sbGet('apartments?select=id,number,tenant_name,apt_label&address_id=eq.' + addrId + '&order=number')
    .then(function(apts) {
      aptList = apts;
      if (!apts.length) {
        document.getElementById('apt-list').innerHTML =
          '<div class="loading">Nėra butų šiame adrese</div>';
        updateStats(0, 0);
        return Promise.reject('__empty__');
      }
      var ids = apts.map(function(a) { return a.id; }).join(',');
      return sbGet(
        'meters?select=id,apartment_id,meter_serial,meter_types(code,label,unit)' +
        '&apartment_id=in.(' + ids + ')'
      );
    })
    .then(function(ms) {
      meterList = ms;
      if (!ms.length) {
        renderApts();
        return Promise.reject('__empty__');
      }
      var mIds = ms.map(function(m) { return m.id; }).join(',');
      /* most recent reading BEFORE the active period (= NUO value) */
      return sbGet(
        'readings?select=meter_id,value_to,period&meter_id=in.(' + mIds + ')' +
        '&period=lt.' + activePeriod + '&order=period.desc'
      );
    })
    .then(function(allPrev) {
      prevR = {};
      allPrev.forEach(function(r) {
        if (prevR[r.meter_id] === undefined) prevR[r.meter_id] = r.value_to;
      });
      var mIds = meterList.map(function(m) { return m.id; }).join(',');
      /* readings for the active period */
      return sbGet(
        'readings?select=id,meter_id,value_from,value_to,note' +
        '&meter_id=in.(' + mIds + ')&period=eq.' + activePeriod
      );
    })
    .then(function(curr) {
      curR = {};
      curr.forEach(function(r) { curR[r.meter_id] = r; });
      renderApts();
    })
    .catch(function(e) {
      if (e === '__empty__') return;
      document.getElementById('apt-list').innerHTML =
        '<div class="loading">&#x26A0; ' + esc(e.message) + '</div>';
    });
}

/* ── RENDER APARTMENT LIST ────────────────────────── */
function renderApts() {
  var list  = document.getElementById('apt-list');
  list.innerHTML = '';
  var total = aptList.length;
  var done  = 0;

  aptList.forEach(function(apt) {
    var aptMs   = meterList.filter(function(m) { return m.apartment_id === apt.id; });
    var isSaved = aptMs.length > 0 && aptMs.every(function(m) { return curR[m.id]; });
    if (isSaved) done++;
    list.appendChild(buildAptCard(apt, aptMs, isSaved));
  });

  updateStats(done, total);
  applyFilter();
}

/* ── BUILD APARTMENT CARD ─────────────────────────── */
function buildAptCard(apt, aptMs, isSaved) {
  var lbl  = apt.apt_label || apt.number;
  var card = document.createElement('div');
  card.className    = 'apt-card' + (isSaved ? ' done' : '');
  card.id           = 'card-' + apt.id;
  card.dataset.done = isSaved ? '1' : '0';

  /* ── HEAD ── */
  var head = document.createElement('div');
  head.className = 'apt-head';

  var numEl = document.createElement('div');
  numEl.className   = 'apt-num';
  numEl.id          = 'aptnum-' + apt.id;
  numEl.textContent = lbl;
  head.appendChild(numEl);

  var nameEl = document.createElement('div');
  nameEl.className   = 'apt-name';
  nameEl.textContent = apt.tenant_name || ('Butas ' + lbl);
  head.appendChild(nameEl);

  if (isSaved && userRole === 'admin') {
    head.appendChild(makeEditBtn(apt.id));
  }

  var badge = document.createElement('div');
  badge.className   = 'apt-badge ' + (isSaved ? 'd' : 'p');
  badge.id          = 'badge-' + apt.id;
  badge.textContent = isSaved ? '✓ Atlikta' : 'Laukia';
  head.appendChild(badge);
  card.appendChild(head);

  /* ── BODY ── */
  var body = document.createElement('div');
  body.className = 'apt-body';

  var isElec = aptMs.some(function(m) {
    return m.meter_types && m.meter_types.code.indexOf('electricity') === 0;
  });
  var isHeat = aptMs.some(function(m) {
    return m.meter_types && m.meter_types.code.indexOf('heat_') === 0;
  });

  if (isElec) {
    buildElecBody(body, apt, aptMs, isSaved);
  } else if (isHeat) {
    buildHeatBody(body, apt, aptMs, isSaved);
  } else {
    buildGenericBody(body, apt, aptMs, isSaved);
  }

  /* note */
  var noteEl = document.createElement('textarea');
  noteEl.className   = 'note-inp';
  noteEl.id          = 'note-' + apt.id;
  noteEl.rows        = 1;
  noteEl.placeholder = 'Pastabos...';
  noteEl.disabled    = isSaved;
  if (isSaved && aptMs[0] && curR[aptMs[0].id]) {
    noteEl.value = curR[aptMs[0].id].note || '';
  }
  body.appendChild(noteEl);
  card.appendChild(body);

  /* ── FOOT ── */
  var foot = document.createElement('div');
  foot.className = 'apt-foot';

  var totEl = document.createElement('div');
  totEl.className   = 'apt-tot';
  totEl.id          = 'tot-' + apt.id;
  totEl.textContent = '—';
  foot.appendChild(totEl);

  var sbtn = document.createElement('button');
  sbtn.className = 'save-btn' + (isSaved ? ' done' : '');
  sbtn.id        = 'sbtn-' + apt.id;
  sbtn.disabled  = isSaved;
  sbtn.textContent = isSaved ? '✓ Išsaugota' : 'Išsaugoti';
  if (!isSaved) {
    sbtn.addEventListener('click', (function(id) {
      return function() { saveApt(id); };
    })(apt.id));
  }
  foot.appendChild(sbtn);
  card.appendChild(foot);

  if (isSaved) calcTotal(apt.id);
  return card;
}

function makeEditBtn(aptId) {
  var b = document.createElement('button');
  b.className   = 'edit-btn';
  b.textContent = '✏ Taisyti';
  b.addEventListener('click', (function(id) { return function() { editApt(id); }; })(aptId));
  return b;
}

/* ── ELECTRICITY BODY ─────────────────────────────── */
function buildElecBody(body, apt, aptMs, isSaved) {
  var dayM   = null;
  var nightM = null;
  aptMs.forEach(function(m) {
    if (m.meter_types.code === 'electricity_day')   dayM   = m;
    if (m.meter_types.code === 'electricity_night') nightM = m;
  });

  /* Bendras parodymas */
  var pDay   = dayM   ? prevR[dayM.id]   : undefined;
  var pNight = nightM ? prevR[nightM.id] : undefined;
  if (pDay !== undefined && pNight !== undefined) {
    var bBox = document.createElement('div');
    bBox.className = 'bendras-box';
    bBox.innerHTML =
      '<span class="bendras-lbl">⚡ Bendras parodymas</span>' +
      '<span class="bendras-val">' + (Number(pDay) + Number(pNight)) + ' kWh</span>';
    body.appendChild(bBox);
  }

  if (dayM)   body.appendChild(buildMeterRow('☀ Dieninis',   dayM,   isSaved, apt.id));
  if (nightM) body.appendChild(buildMeterRow('🌙 Naktinis', nightM, isSaved, apt.id));
}

/* ── HEAT BODY ────────────────────────────────────── */
function buildHeatBody(body, apt, aptMs, isSaved) {
  var mwhM = null, m3M = null, hM = null, wM = null;
  aptMs.forEach(function(m) {
    var c = m.meter_types.code;
    if (c === 'heat_mwh')                     mwhM = m;
    else if (c === 'heat_m3')                 m3M  = m;
    else if (c === 'heat_h')                  hM   = m;
    else if (c === 'water_m3' || c === 'hot_water') wM = m;
  });
  if (mwhM) body.appendChild(buildMeterRow('🌡️ MWh/kWh', mwhM, isSaved, apt.id));
  if (m3M)  body.appendChild(buildMeterRow('💧 m³',       m3M,  isSaved, apt.id));
  if (hM)   body.appendChild(buildMeterRow('⏱ val',                 hM,   isSaved, apt.id));
  if (wM)   body.appendChild(buildMeterRow('🚿 Vanduo m³', wM, isSaved, apt.id));
}

/* ── GENERIC BODY ─────────────────────────────────── */
function buildGenericBody(body, apt, aptMs, isSaved) {
  aptMs.forEach(function(m) {
    var lbl2 = m.meter_types ? m.meter_types.label : 'Skaitiklis';
    body.appendChild(buildMeterRow(lbl2, m, isSaved, apt.id));
  });
}

/* ── METER ROW ────────────────────────────────────── */
function buildMeterRow(label, m, disabled, aptId) {
  var sec = document.createElement('div');
  sec.className = 'meter-sec';

  var lblEl = document.createElement('div');
  lblEl.className   = 'meter-lbl';
  lblEl.textContent = label;
  sec.appendChild(lblEl);

  var row = document.createElement('div');
  row.className = 'meter-row';

  var prevVal = prevR[m.id] !== undefined ? prevR[m.id] : '';
  var currRow = curR[m.id];
  var currVal = currRow ? currRow.value_to : '';

  /* NUO */
  var nuoDiv = document.createElement('div');
  nuoDiv.className = 'fld';
  nuoDiv.innerHTML = '<label>NUO</label>';
  var nuoInp = document.createElement('input');
  nuoInp.type      = 'number';
  nuoInp.id        = 'nuo-' + m.id;
  nuoInp.className = 'pf';
  nuoInp.value     = prevVal;
  nuoInp.readOnly  = true;
  nuoDiv.appendChild(nuoInp);
  row.appendChild(nuoDiv);

  /* IKI */
  var ikiDiv = document.createElement('div');
  ikiDiv.className = 'fld';
  ikiDiv.innerHTML = '<label>IKI</label>';
  var ikiInp = document.createElement('input');
  ikiInp.type        = 'number';
  ikiInp.id          = 'iki-' + m.id;
  ikiInp.inputMode   = 'decimal';
  ikiInp.placeholder = 'Įvesti…';
  ikiInp.value       = currVal !== '' ? String(currVal) : '';
  ikiInp.disabled    = disabled;
  if (!disabled) {
    ikiInp.addEventListener('input', (function(mId, aId) {
      return function() { calcChip(mId); calcTotal(aId); };
    })(m.id, aptId));
  }
  ikiDiv.appendChild(ikiInp);
  row.appendChild(ikiDiv);

  /* chip */
  var chip = document.createElement('div');
  chip.className   = 'chip zero';
  chip.id          = 'chip-' + m.id;
  chip.textContent = '—';
  row.appendChild(chip);

  sec.appendChild(row);

  /* calculate chip if already has value */
  if (currVal !== '') refreshChip(m.id, prevVal, currVal);

  return sec;
}

/* ── CHIP / TOTAL ─────────────────────────────────── */
function calcChip(mId) {
  var nEl = document.getElementById('nuo-' + mId);
  var iEl = document.getElementById('iki-' + mId);
  if (!nEl || !iEl) return;
  refreshChip(mId, nEl.value, iEl.value);
}

function refreshChip(mId, nuoVal, ikiVal) {
  var chip = document.getElementById('chip-' + mId);
  var iEl  = document.getElementById('iki-' + mId);
  if (!chip) return;
  var iki = parseFloat(ikiVal);
  var nuo = parseFloat(nuoVal) || 0;
  if (isNaN(iki)) {
    chip.textContent = '—';
    chip.className   = 'chip zero';
    if (iEl) iEl.className = '';
    return;
  }
  var d = Math.round((iki - nuo) * 1000) / 1000;
  chip.textContent = (d >= 0 ? '+' : '') + d;
  chip.className   = 'chip ' + (d < 0 ? 'neg' : d === 0 ? 'zero' : 'pos');
  if (iEl) iEl.className = d < 0 ? 'ei' : '';
}

function calcTotal(aptId) {
  var ms = meterList.filter(function(m) { return m.apartment_id === aptId; });
  var tot = 0, valid = true;
  ms.forEach(function(m) {
    var nEl = document.getElementById('nuo-' + m.id);
    var iEl = document.getElementById('iki-' + m.id);
    var iki = iEl ? parseFloat(iEl.value) : NaN;
    var nuo = nEl ? parseFloat(nEl.value) || 0 : 0;
    if (isNaN(iki)) { valid = false; return; }
    tot += iki - nuo;
  });
  var unit = ms[0] && ms[0].meter_types ? ms[0].meter_types.unit : 'kWh';
  var el   = document.getElementById('tot-' + aptId);
  if (el) el.textContent = valid ? (Math.round(tot * 1000) / 1000 + ' ' + unit) : '—';
}

/* ── FILTER ───────────────────────────────────────── */
function setFilter(f, btn) {
  curFilter = f;
  resetFilterBtns();
  btn.classList.add('on');
  applyFilter();
}

function resetFilterBtns() {
  ['f-all','f-pending','f-done'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.className = 'tbtn';
  });
  var active = document.getElementById('f-' + curFilter);
  if (active) active.classList.add('on');
}

function applyFilter() {
  var cards = document.querySelectorAll('.apt-card');
  for (var i = 0; i < cards.length; i++) {
    var c     = cards[i];
    var saved = c.dataset.done === '1';
    var show  = curFilter === 'all' ||
               (curFilter === 'done'    &&  saved) ||
               (curFilter === 'pending' && !saved);
    c.style.display = show ? '' : 'none';
  }
}

/* ── STATS ────────────────────────────────────────── */
function updateStats(done, total) {
  document.getElementById('s-tot').textContent  = total;
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = total - done;
  document.getElementById('hdr-done').textContent = done + '/' + total;
  var pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-lbl').textContent  = pct + '% atlikta';
  if (selAddr) {
    var el = document.getElementById('ap-' + selAddr.id);
    if (el) el.textContent = done + '/' + total;
  }
}

/* ── SAVE ─────────────────────────────────────────── */
function saveApt(aptId) {
  var apt = null;
  for (var i = 0; i < aptList.length; i++) {
    if (aptList[i].id === aptId) { apt = aptList[i]; break; }
  }
  if (!apt) return;

  var ms   = meterList.filter(function(m) { return m.apartment_id === aptId; });
  var note = (document.getElementById('note-' + aptId) || {}).value || '';
  var rows = [];
  var ok   = true;

  ms.forEach(function(m) {
    var nEl = document.getElementById('nuo-' + m.id);
    var iEl = document.getElementById('iki-' + m.id);
    var nuo = nEl ? parseFloat(nEl.value) || 0 : 0;
    var iki = iEl ? parseFloat(iEl.value) : NaN;
    if (isNaN(iki)) { toast('Įveskite visus parodymus!', 'er'); ok = false; return; }
    if (iki < nuo)  { toast('IKI negali būti mažesnis už NUO!', 'er'); ok = false; return; }
    rows.push({ meter_id: m.id, period: activePeriod, value_from: nuo, value_to: iki, note: note });
  });
  if (!ok) return;

  var btn = document.getElementById('sbtn-' + aptId);
  btn.textContent = '…';
  btn.disabled    = true;

  var chain = Promise.resolve();
  rows.forEach(function(ins) {
    chain = chain.then(function() {
      var ex = curR[ins.meter_id];
      if (ex) {
        return sbPatch('readings?id=eq.' + ex.id, { value_to: ins.value_to, note: ins.note })
          .then(function() {
            ex.value_to = ins.value_to;
            ex.note     = ins.note;
          });
      } else {
        return sbPost('readings', ins).then(function(res) {
          if (Array.isArray(res) && res[0]) curR[ins.meter_id] = res[0];
        });
      }
    });
  });

  chain
    .then(function() {
      markDone(aptId, apt);
      toast('Butas ' + (apt.apt_label || apt.number) + ' išsaugotas!', 'ok');
    })
    .catch(function(e) {
      btn.textContent = 'Išsaugoti';
      btn.disabled    = false;
      toast('Klaida: ' + e.message, 'er');
    });
}

/* ── MARK DONE ────────────────────────────────────── */
function markDone(aptId, apt) {
  var card = document.getElementById('card-' + aptId);
  if (!card) return;
  card.classList.add('done');
  card.dataset.done = '1';

  var numEl = document.getElementById('aptnum-' + aptId);
  if (numEl) numEl.style.background = 'var(--green)';

  var badge = document.getElementById('badge-' + aptId);
  if (badge) { badge.textContent = '✓ Atlikta'; badge.className = 'apt-badge d'; }

  var btn = document.getElementById('sbtn-' + aptId);
  if (btn) { btn.textContent = '✓ Išsaugota'; btn.className = 'save-btn done'; btn.disabled = true; }

  var noteEl = document.getElementById('note-' + aptId);
  if (noteEl) noteEl.disabled = true;

  meterList.filter(function(m) { return m.apartment_id === aptId; }).forEach(function(m) {
    var iEl = document.getElementById('iki-' + m.id);
    if (iEl) iEl.disabled = true;
  });

  if (userRole === 'admin') {
    var head = card.querySelector('.apt-head');
    if (head && !head.querySelector('.edit-btn')) {
      head.insertBefore(makeEditBtn(aptId), badge);
    }
  }

  calcTotal(aptId);

  /* recalc stats */
  var done = 0;
  aptList.forEach(function(a) {
    var ms = meterList.filter(function(m) { return m.apartment_id === a.id; });
    if (ms.length > 0 && ms.every(function(m) { return curR[m.id]; })) done++;
  });
  updateStats(done, aptList.length);
  applyFilter();
}

/* ── ADMIN: EDIT ──────────────────────────────────── */
function editApt(aptId) {
  if (userRole !== 'admin') { toast('Tik admin gali taisyti!', 'er'); return; }
  var card = document.getElementById('card-' + aptId);
  if (!card) return;

  card.classList.remove('done');
  card.dataset.done = '0';

  var numEl = document.getElementById('aptnum-' + aptId);
  if (numEl) numEl.style.background = '';

  var badge = document.getElementById('badge-' + aptId);
  if (badge) { badge.textContent = 'Laukia'; badge.className = 'apt-badge p'; }

  var btn = document.getElementById('sbtn-' + aptId);
  if (btn) {
    btn.textContent = 'Išsaugoti';
    btn.className   = 'save-btn';
    btn.disabled    = false;
    /* replace onclick */
    var newBtn = btn.cloneNode(true);
    btn.parentNode.replaceChild(newBtn, btn);
    newBtn.addEventListener('click', (function(id) { return function() { saveApt(id); }; })(aptId));
  }

  meterList.filter(function(m) { return m.apartment_id === aptId; }).forEach(function(m) {
    var iEl = document.getElementById('iki-' + m.id);
    if (iEl) iEl.disabled = false;
  });

  var noteEl = document.getElementById('note-' + aptId);
  if (noteEl) noteEl.disabled = false;

  var eb = card.querySelector('.edit-btn');
  if (eb) eb.remove();

  toast('Redagavimo režimas įjungtas', 'ok');
  applyFilter();
}

/* ── ADMIN: REPORT ────────────────────────────────── */
function generateReport() {
  if (userRole !== 'admin') { toast('Tik admin!', 'er'); return; }
  var addrId = document.getElementById('rep-addr').value;
  var month  = document.getElementById('rep-month').value;
  if (!month) { toast('Pasirinkite mėnesį!', 'er'); return; }

  var pts  = month.split('-');
  var yr   = parseInt(pts[0], 10);
  var mo   = parseInt(pts[1], 10);
  var mLbl = (MEN[mo] || month) + ' ' + yr;

  var out  = document.getElementById('rep-output');
  out.innerHTML = '<div class="loading"><div class="spinner"></div>Kraunama...</div>';

  var toReport  = addrId
    ? addrList.filter(function(a) { return String(a.id) === String(addrId); })
    : addrList;

  var allHtml  = '';
  var csvRows  = [['Adresas','Butas','Abonento vardas','Skaitiklio tipas','NUO','IKI','Suvartota','Vnt.','Pastabos']];
  var idx      = 0;

  function next() {
    if (idx >= toReport.length) {
      if (!allHtml) {
        out.innerHTML = '<div class="loading">Nėra duomenų</div>';
        return;
      }
      out.innerHTML =
        allHtml +
        '<button class="exp-btn" id="exp-btn">📄 Eksportuoti CSV</button>';
      document.getElementById('exp-btn').addEventListener('click', function() {
        exportCsv(csvRows, month);
      });
      return;
    }
    var addr = toReport[idx++];

    sbGet('apartments?select=id,number,tenant_name,apt_label&address_id=eq.' + addr.id + '&order=number')
      .then(function(apts) {
        if (!apts.length) { next(); return; }
        var aptIds = apts.map(function(a) { return a.id; }).join(',');
        sbGet('meters?select=id,apartment_id,meter_types(code,label,unit)&apartment_id=in.(' + aptIds + ')')
          .then(function(ms) {
            if (!ms.length) { next(); return; }
            var mIds = ms.map(function(m) { return m.id; }).join(',');
            sbGet('readings?select=meter_id,value_from,value_to,note&meter_id=in.(' + mIds + ')&period=eq.' + month)
              .then(function(rds) {
                var rm = {};
                rds.forEach(function(r) { rm[r.meter_id] = r; });

                var fm      = ms[0];
                var isElec  = fm && fm.meter_types && fm.meter_types.code.indexOf('electricity') === 0;
                var unit    = fm && fm.meter_types ? fm.meter_types.unit : '';
                var totCons = 0;
                var rows    = '';

                apts.forEach(function(apt) {
                  var aptMs  = ms.filter(function(m) { return m.apartment_id === apt.id; });
                  var aptLbl = apt.apt_label || apt.number;

                  if (isElec) {
                    var dM = null, nM = null;
                    aptMs.forEach(function(m) {
                      if (m.meter_types.code === 'electricity_day')   dM = m;
                      if (m.meter_types.code === 'electricity_night') nM = m;
                    });
                    var rd = dM ? rm[dM.id] : null;
                    var rn = nM ? rm[nM.id] : null;
                    var dc = rd ? (Number(rd.value_to) - Number(rd.value_from)) : null;
                    var nc = rn ? (Number(rn.value_to) - Number(rn.value_from)) : null;
                    if (dc !== null) totCons += dc;
                    if (nc !== null) totCons += nc;
                    rows +=
                      '<tr><td><b>' + esc(String(aptLbl)) + '</b></td>' +
                      '<td>' + esc(apt.tenant_name || '—') + '</td>' +
                      '<td>' + (rd ? esc(rd.value_from) : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (rd ? esc(rd.value_to)   : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (dc !== null ? dc : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (rn ? esc(rn.value_from) : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (rn ? esc(rn.value_to)   : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (nc !== null ? nc : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + ((!rd && !rn) ? '<span class="missing">Nenurašyta</span>' : esc(rd ? rd.note || '' : '')) + '</td></tr>';
                    if (dM) csvRows.push([addr.name, aptLbl, apt.tenant_name||'', 'Dieninis', rd?rd.value_from:'', rd?rd.value_to:'', dc!==null?dc:'', 'kWh', rd?rd.note||'':'Nenurašyta']);
                    if (nM) csvRows.push([addr.name, aptLbl, apt.tenant_name||'', 'Naktinis', rn?rn.value_from:'', rn?rn.value_to:'', nc!==null?nc:'', 'kWh', rn?rn.note||'':'Nenurašyta']);
                  } else {
                    aptMs.forEach(function(m) {
                      var r    = rm[m.id];
                      var cons = r ? (Number(r.value_to) - Number(r.value_from)) : null;
                      if (cons !== null) totCons += cons;
                      csvRows.push([addr.name, aptLbl, apt.tenant_name||'', m.meter_types.label,
                        r?r.value_from:'', r?r.value_to:'', cons!==null?cons:'', m.meter_types.unit, r?r.note||'':'Nenurašyta']);
                    });
                    var fr = aptMs.length ? rm[aptMs[0].id] : null;
                    var fc = fr ? (Number(fr.value_to) - Number(fr.value_from)) : null;
                    var miss = aptMs.some(function(m) { return !rm[m.id]; });
                    rows +=
                      '<tr><td><b>' + esc(String(aptLbl)) + '</b></td>' +
                      '<td>' + esc(apt.tenant_name || '—') + '</td>' +
                      '<td>' + (fr ? esc(fr.value_from) : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (fr ? esc(fr.value_to)   : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (fc !== null ? fc : '<span class="missing">—</span>') + '</td>' +
                      '<td>' + (miss ? '<span class="missing">Nenurašyta</span>' : esc(fr ? fr.note||'' : '')) + '</td></tr>';
                  }
                });

                var cols = isElec
                  ? '<th>Nr.</th><th>Vardas</th><th>D.NUO</th><th>D.IKI</th><th>D.kWh</th><th>N.NUO</th><th>N.IKI</th><th>N.kWh</th><th>Pastabos</th>'
                  : '<th>Nr.</th><th>Vardas</th><th>NUO</th><th>IKI</th><th>Suvartota (' + esc(unit) + ')</th><th>Pastabos</th>';

                allHtml +=
                  '<div class="rep-table-wrap">' +
                  '<div class="rep-table-title">' + esc(addr.name) + ' · ' + esc(mLbl) +
                  ' · Iš viso: ' + totCons.toFixed(2) + ' ' + esc(unit) + '</div>' +
                  '<div class="rep-scroll"><table class="rep-table">' +
                  '<thead><tr>' + cols + '</tr></thead>' +
                  '<tbody>' + rows + '</tbody></table></div></div>';

                next();
              })
              .catch(function(e) {
                allHtml += '<div class="loading">⚠ ' + esc(e.message) + '</div>';
                next();
              });
          })
          .catch(function(e) {
            allHtml += '<div class="loading">⚠ ' + esc(e.message) + '</div>';
            next();
          });
      })
      .catch(function(e) {
        allHtml += '<div class="loading">⚠ ' + esc(e.message) + '</div>';
        next();
      });
  }

  next();
}

/* ── ELECTRICITY CALCULATOR ───────────────────────── */
var calcApts     = [];
var calcHotWater = {}; // apt_id -> m3 consumed

function loadCalcData() {
  var addrId = document.getElementById('calc-addr').value;
  var month  = document.getElementById('calc-month').value;
  var out    = document.getElementById('calc-output');

  if (!addrId || !month) { toast('Pasirinkite adresą ir mėnesį', 'err'); return; }

  out.innerHTML = '<div class="loading">Kraunama…</div>';
  calcApts = [];
  calcHotWater = {};

  sbGet('apartments?select=id,number,tenant_name,apt_label&address_id=eq.' + addrId + '&order=number')
    .then(function(apts) {
      if (!apts.length) { out.innerHTML = '<div class="loading">Nėra butų</div>'; return; }
      calcApts = apts;
      var aptIds = apts.map(function(a) { return a.id; }).join(',');
      sbGet('meters?select=id,apartment_id,meter_types(code,label,unit)&apartment_id=in.(' + aptIds + ')')
        .then(function(meters) {
          var hwIds = [];
          var hwApt = {};
          meters.forEach(function(m) {
            var code = m.meter_types && m.meter_types.code;
            console.log('[calc] Meter id=' + m.id + ' apt=' + m.apartment_id + ' code=' + code);
            if (code === 'hot_water' || code === 'water_m3') {
              hwIds.push(m.id);
              hwApt[m.id] = m.apartment_id;
            }
          });
          console.log('[calc] Hot water meter IDs:', hwIds);

          if (!hwIds.length) {
            toast('⚠ Karšto vandens skaitiklių nerasta šiame adrese', 'err');
            showCalcHeatTable(out);
            return;
          }

          sbGet('readings?meter_id=in.(' + hwIds.join(',') + ')&period=eq.' + month)
            .then(function(readings) {
              console.log('[calc] Hot water readings for ' + month + ':', readings);
              readings.forEach(function(r) {
                var aptId = hwApt[r.meter_id];
                console.log('[calc] Reading meter_id=' + r.meter_id + ' aptId=' + aptId +
                  ' value_from=' + r.value_from + ' value_to=' + r.value_to);
                if (aptId !== undefined && r.value_to != null) {
                  var from = r.value_from != null ? Number(r.value_from) : 0;
                  calcHotWater[aptId] = (calcHotWater[aptId] || 0) + (Number(r.value_to) - from);
                }
              });
              console.log('[calc] calcHotWater:', JSON.stringify(calcHotWater));
              if (!readings.length) {
                toast('⚠ Kovo mėn. karšto vandens rodmenų nerasta', 'err');
              }
              showCalcHeatTable(out);
            })
            .catch(function(e) { out.innerHTML = '<div class="loading">⚠ ' + esc(e.message) + '</div>'; });
        })
        .catch(function(e) { out.innerHTML = '<div class="loading">⚠ ' + esc(e.message) + '</div>'; });
    })
    .catch(function(e) { out.innerHTML = '<div class="loading">⚠ ' + esc(e.message) + '</div>'; });
}

function showCalcHeatTable(out) {
  var savedKey = localStorage.getItem('aiKey') || '';
  var keyInp   = document.getElementById('calc-ai-key');
  if (keyInp && !keyInp.value && savedKey) keyInp.value = savedKey;

  var month    = document.getElementById('calc-month').value;
  var prevMonth = getPrevMonth(month);

  var html = '<div style="padding:8px 0 4px;display:flex;gap:8px;align-items:center;">' +
    '<label style="font-size:.75rem;font-weight:700;color:var(--muted);flex:1;">&#x1F321;&#xFE0F; Šildymo skaitiklių rodmenys (' + month + '):</label>' +
    '<label class="gen-btn" style="margin:0;cursor:pointer;font-size:.82rem;padding:9px 12px;" id="lbl-ai-upload">&#x1F4F7; Foto' +
    '<input type="file" id="calc-ai-img" accept="image/*" style="display:none;" /></label>' +
    '</div>';
  html += '<div id="ai-status" style="font-size:.78rem;color:var(--muted);padding-bottom:6px;min-height:18px;"></div>';

  calcApts.forEach(function(apt) {
    var m3    = calcHotWater[apt.id];
    var aptLbl = apt.apt_label || apt.number || apt.id;
    html += '<div class="apt-heat-card">' +
      '<div class="apt-heat-hdr">' +
        '<b>Butas ' + esc(String(aptLbl)) + '</b>' +
        '<span style="color:var(--muted);font-size:.82rem;">' + esc(apt.tenant_name || '') + '</span>' +
        '<span class="kv-badge">K.V.: ' + (m3 != null ? m3.toFixed(3) + ' m³' : '—') + '</span>' +
      '</div>' +
      '<table class="heat-room-tbl"><thead><tr><th>Kambarys</th><th>NUO (praeitas)</th><th>IKI (dabartinis)</th></tr></thead><tbody>';
    ROOM_NAMES.forEach(function(rname, ri) {
      html += '<tr>' +
        '<td>' + esc(rname) + '</td>' +
        '<td><input type="number" class="room-nuo" data-apt="' + apt.id + '" data-r="' + ri + '" inputmode="decimal" step="any" placeholder="0" /></td>' +
        '<td><input type="number" class="room-iki" data-apt="' + apt.id + '" data-r="' + ri + '" inputmode="decimal" step="any" placeholder="0" /></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
  });

  html += '<button class="gen-btn" style="margin:10px 0 4px;" id="btn-calc-run">&#x26A1; Skaičiuoti</button>';
  html += '<div id="calc-results"></div>';
  out.innerHTML = html;

  /* load current month, then fall back to prev month for NUO */
  var aptIds = calcApts.map(function(a) { return a.id; }).join(',');
  var status = document.getElementById('ai-status');
  sbGet('heating_entries?apartment_id=in.(' + aptIds + ')&period=in.(' + month + ',' + prevMonth + ')&select=apartment_id,period,rooms')
    .then(function(entries) {
      var currMap = {}; var prevMap = {};
      entries.forEach(function(e) {
        if (e.period === month)     currMap[e.apartment_id] = e.rooms;
        if (e.period === prevMonth) prevMap[e.apartment_id] = e.rooms;
      });
      var filledCurr = 0; var filledPrev = 0;
      calcApts.forEach(function(apt) {
        var curr = currMap[apt.id]; var prev = prevMap[apt.id];
        for (var ri = 0; ri < ROOM_NAMES.length; ri++) {
          var nuoEl = document.querySelector('.room-nuo[data-apt="' + apt.id + '"][data-r="' + ri + '"]');
          var ikiEl = document.querySelector('.room-iki[data-apt="' + apt.id + '"][data-r="' + ri + '"]');
          if (curr && curr[ri]) {
            if (nuoEl && curr[ri].nuo) nuoEl.value = curr[ri].nuo;
            if (ikiEl && curr[ri].iki) ikiEl.value = curr[ri].iki;
            filledCurr = 1;
          } else if (prev && prev[ri] && prev[ri].iki) {
            if (nuoEl) nuoEl.value = prev[ri].iki; /* auto-fill NUO from last month's IKI */
            filledPrev = 1;
          }
        }
      });
      if (filledCurr) status.textContent = '✓ Įkelti šio mėnesio rodmenys';
      else if (filledPrev) status.textContent = '✓ NUO laukeliai užpildyti iš praėjusio mėnesio';
    })
    .catch(function() {});

  document.getElementById('btn-calc-run').addEventListener('click', runCalc);
  document.getElementById('calc-ai-img').addEventListener('change', function() {
    var file = this.files[0];
    if (!file) return;
    var keyEl  = document.getElementById('calc-ai-key');
    var apiKey = (keyEl && keyEl.value.trim()) || localStorage.getItem('aiKey') || '';
    if (!apiKey) { toast('Įveskite Anthropic API raktą', 'err'); return; }
    localStorage.setItem('aiKey', apiKey);
    parseHeatScreenshot(file, apiKey);
  });
}

function parseHeatScreenshot(file, apiKey) {
  var status  = document.getElementById('ai-status');
  status.textContent = '⏳ Analizuojama…';
  var reader = new FileReader();
  reader.onload = function(e) {
    var b64    = e.target.result.split(',')[1];
    var mtype  = file.type || 'image/jpeg';
    var aptNums = calcApts.map(function(a) { return a.apt_label || a.number || a.id; });

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-7',
        max_tokens: 2048,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mtype, data: b64 } },
            {
              type: 'text',
              text: 'This is a Lithuanian apartment heating meter Excel table. ' +
                'For each apartment row, find the CURRENT (IKI) meter readings for the 4 heating rooms: Svetainė, Miegamasis, San.mazgas, Miegamasis 2. ' +
                'These are cumulative meter values (not consumption). ' +
                'Return ONLY a JSON array (no explanation): ' +
                '[{"apt":1,"rooms":[{"iki":908},{"iki":262},{"iki":739},{"iki":0}]},...] ' +
                'Always include exactly 4 rooms per apartment in the same order: Svetainė, Miegamasis, San.mazgas, Miegamasis 2. ' +
                'If a room has no meter (value is 0 or empty), use 0. ' +
                'Apartment numbers: ' + aptNums.join(', ') + '.'
            }
          ]
        }]
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { status.textContent = '⚠ ' + data.error.message; return; }
      var text  = data.content && data.content[0] && data.content[0].text || '';
      var match = text.match(/\[[\s\S]*\]/);
      if (!match) { status.textContent = '⚠ Nepavyko perskaityti atsakymo'; return; }
      var items = JSON.parse(match[0]);
      var filled = 0;
      items.forEach(function(item) {
        calcApts.forEach(function(apt) {
          var lbl = String(apt.apt_label || apt.number || apt.id);
          if (String(item.apt) === lbl && item.rooms) {
            item.rooms.forEach(function(rm, ri) {
              var ikiEl = document.querySelector('.room-iki[data-apt="' + apt.id + '"][data-r="' + ri + '"]');
              if (ikiEl && rm.iki != null) ikiEl.value = rm.iki;
            });
            filled++;
          }
        });
      });
      status.textContent = '✓ IKI rodmenys užpildyti ' + filled + ' iš ' + calcApts.length + ' butų';
    })
    .catch(function(e) { status.textContent = '⚠ ' + e.message; });
  };
  reader.readAsDataURL(file);
}

function runCalc() {
  var totalKwh = parseFloat(document.getElementById('calc-total-kwh').value);
  var price    = parseFloat(document.getElementById('calc-price').value);
  var kwhPerM3 = parseFloat(document.getElementById('calc-kwh-m3').value);
  var month    = document.getElementById('calc-month').value;
  var resDiv   = document.getElementById('calc-results');

  if (!resDiv) return;
  if (isNaN(totalKwh) || isNaN(price) || isNaN(kwhPerM3)) {
    toast('Įveskite visus skaičius konfigūracijoje', 'err'); return;
  }

  /* collect rooms and save */
  var toSave = [];
  calcApts.forEach(function(apt) {
    var rooms = [];
    var anyFilled = false;
    for (var ri = 0; ri < ROOM_NAMES.length; ri++) {
      var nuoEl = document.querySelector('.room-nuo[data-apt="' + apt.id + '"][data-r="' + ri + '"]');
      var ikiEl = document.querySelector('.room-iki[data-apt="' + apt.id + '"][data-r="' + ri + '"]');
      var nuo = nuoEl && nuoEl.value !== '' ? parseFloat(nuoEl.value) : 0;
      var iki = ikiEl && ikiEl.value !== '' ? parseFloat(ikiEl.value) : 0;
      rooms.push({ nuo: nuo, iki: iki });
      if (nuo > 0 || iki > 0) anyFilled = true;
    }
    if (anyFilled) {
      var delta   = rooms.reduce(function(s,r){ return s + Math.max(0, r.iki - r.nuo); }, 0);
      var heatKwh = delta * DIRECT_HEAT_RATIO;
      toSave.push({ apartment_id: apt.id, period: month, kwh_total: heatKwh, rooms: rooms });
    }
  });

  if (toSave.length) {
    sbUpsert('heating_entries?on_conflict=apartment_id,period', toSave)
      .then(function() { toast('Šildymo rodmenys išsaugoti', 'ok'); })
      .catch(function(e) { toast('Nepavyko išsaugoti: ' + e.message, 'err'); });
  }

  showCalcResults(resDiv, totalKwh, price, kwhPerM3, month);
}

function showCalcResults(resDiv, totalKwh, price, kwhPerM3, month) {
  /* collect rooms from inputs */
  var rows = [];
  var sumKvKwh = 0; var sumHeatKwh = 0;

  calcApts.forEach(function(apt) {
    var kvM3    = calcHotWater[apt.id] != null ? calcHotWater[apt.id] : 0;
    var kvKwh   = kvM3 * kwhPerM3;
    var rooms   = [];
    var totalDelta = 0;
    for (var ri = 0; ri < ROOM_NAMES.length; ri++) {
      var nuoEl = document.querySelector('.room-nuo[data-apt="' + apt.id + '"][data-r="' + ri + '"]');
      var ikiEl = document.querySelector('.room-iki[data-apt="' + apt.id + '"][data-r="' + ri + '"]');
      var nuo = nuoEl && nuoEl.value !== '' ? parseFloat(nuoEl.value) : 0;
      var iki = ikiEl && ikiEl.value !== '' ? parseFloat(ikiEl.value) : 0;
      var delta = Math.max(0, iki - nuo);
      rooms.push({ nuo: nuo, iki: iki, delta: delta });
      totalDelta += delta;
    }
    var heatKwh = totalDelta * DIRECT_HEAT_RATIO;
    rows.push({ apt: apt, kvM3: kvM3, kvKwh: kvKwh, heatKwh: heatKwh, rooms: rooms });
    sumKvKwh  += kvKwh;
    sumHeatKwh += heatKwh;
  });

  var bnoKwh = totalKwh - sumKvKwh - sumHeatKwh;
  var bnoNeg = bnoKwh < 0;
  var bnoEur = bnoKwh * price;

  var warnHtml = bnoNeg
    ? '<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;margin-bottom:8px;color:#991b1b;font-weight:700;">⚠ Butų šildymas + karštas vanduo (' + (sumKvKwh + sumHeatKwh).toFixed(2) + ' kWh) viršija bendrą elektrą (' + totalKwh.toFixed(2) + ' kWh)!</div>'
    : '';

  var html = warnHtml + '<div class="calc-summary">' +
    '<span>Bendra elektra:</span><span><b>' + totalKwh.toFixed(2) + ' kWh</b></span>' +
    '<span>K.V. iš viso:</span><span>' + sumKvKwh.toFixed(2) + ' kWh</span>' +
    '<span>Šildymas iš viso:</span><span>' + sumHeatKwh.toFixed(2) + ' kWh</span>' +
    '<span>BNO patalpų šildymas:</span><span' + (bnoNeg ? ' style="color:#dc2626;font-weight:700"' : '') + '>' + bnoKwh.toFixed(2) + ' kWh</span>' +
    '<span>Kaina:</span><span>' + price.toFixed(4) + ' EUR/kWh</span>' +
    '</div>';

  /* ── grouped header table ── */
  var rShort = ['Sv.','Mieg.','San.','M2.'];
  /* header row 1 */
  html += '<div class="rep-scroll"><table class="rep-table"><thead>' +
    '<tr>' +
      '<th rowspan="2">Butas</th><th rowspan="2">Abonentas</th>' +
      '<th rowspan="2">K.V. m³</th><th rowspan="2">K.V. kWh</th><th rowspan="2">K.V. EUR</th>';
  ROOM_NAMES.forEach(function(rn) {
    html += '<th colspan="3" style="text-align:center;border-left:2px solid #374151;">' + esc(rn) + '</th>';
  });
  html += '<th rowspan="2">Šild. kWh</th><th rowspan="2">Viso kWh</th><th rowspan="2">Viso EUR</th>' +
    '</tr>';
  /* header row 2 */
  html += '<tr>';
  ROOM_NAMES.forEach(function() {
    html += '<th style="border-left:2px solid #374151;">NUO</th><th>IKI</th><th>Δ</th>';
  });
  html += '</tr></thead><tbody>';

  var xlsxData = [];
  /* xlsx header row 1 */
  var hdr1 = ['Butas','Abonentas','K.V. m3','K.V. kWh','K.V. EUR'];
  ROOM_NAMES.forEach(function(rn){ hdr1.push(rn,'',''); });
  hdr1.push('Sild. kWh','Viso kWh','Viso EUR');
  xlsxData.push(hdr1);
  /* xlsx header row 2 */
  var hdr2 = ['','','','',''];
  ROOM_NAMES.forEach(function(){ hdr2.push('NUO','IKI','Delta'); });
  hdr2.push('','','');
  xlsxData.push(hdr2);

  var totAptEur = 0;

  rows.forEach(function(row) {
    var visoKwh = row.kvKwh + row.heatKwh;
    var visoEur = visoKwh * price;
    totAptEur  += visoEur;
    var aptLbl  = String(row.apt.apt_label || row.apt.number || row.apt.id);
    var tenant  = row.apt.tenant_name || '';

    html += '<tr>' +
      '<td><b>' + esc(aptLbl) + '</b></td>' +
      '<td>' + esc(tenant) + '</td>' +
      '<td>' + row.kvM3.toFixed(3) + '</td>' +
      '<td>' + row.kvKwh.toFixed(2) + '</td>' +
      '<td>' + (row.kvKwh * price).toFixed(2) + '</td>';
    row.rooms.forEach(function(rm, ri) {
      html += '<td style="border-left:2px solid var(--border);">' + (rm.nuo || 0) + '</td>' +
              '<td>' + (rm.iki || 0) + '</td>' +
              '<td><b>' + rm.delta.toFixed(0) + '</b></td>';
    });
    html += '<td>' + row.heatKwh.toFixed(2) + '</td>' +
            '<td><b>' + visoKwh.toFixed(2) + '</b></td>' +
            '<td><b>' + visoEur.toFixed(2) + '</b></td>' +
            '</tr>';

    var xlsxRow = [aptLbl, tenant, row.kvM3, row.kvKwh, +(row.kvKwh * price).toFixed(2)];
    row.rooms.forEach(function(rm){ xlsxRow.push(rm.nuo||0, rm.iki||0, rm.delta); });
    xlsxRow.push(+row.heatKwh.toFixed(2), +visoKwh.toFixed(2), +visoEur.toFixed(2));
    xlsxData.push(xlsxRow);
  });

  /* BNO tfoot */
  var bnoColspan = 5 + ROOM_NAMES.length * 3;
  var bnoStyle   = bnoNeg ? ' style="background:#fee2e2;color:#991b1b;"' : ' style="background:#fef3c7;color:#92400e;"';
  var totalCols  = 5 + ROOM_NAMES.length * 3 + 3;
  html += '</tbody><tfoot>' +
    '<tr' + bnoStyle + '>' +
      '<td colspan="' + bnoColspan + '" style="font-weight:700;">BNO patalpų šildymas</td>' +
      '<td>' + bnoKwh.toFixed(2) + '</td>' +
      '<td>' + bnoKwh.toFixed(2) + '</td>' +
      '<td style="font-weight:700;">' + bnoEur.toFixed(2) + '</td>' +
    '</tr>' +
    '<tr style="background:#111827;color:#fff;">' +
      '<td colspan="' + (totalCols - 1) + '" style="font-weight:700;">Viso</td>' +
      '<td style="font-weight:700;">' + (totAptEur + (bnoNeg ? 0 : bnoEur)).toFixed(2) + '</td>' +
    '</tr>' +
    '</tfoot></table></div>';

  var bnoXlsx = ['BNO patalpų šildymas'];
  for (var i = 1; i < bnoColspan; i++) bnoXlsx.push('');
  bnoXlsx.push(+bnoKwh.toFixed(2), +bnoKwh.toFixed(2), +bnoEur.toFixed(2));
  xlsxData.push(bnoXlsx);

  html += '<button class="gen-btn" style="margin:10px 4px 16px 0;" onclick="exportCalcXlsx()">&#x1F4CA; Excel</button>' +
          '<button class="gen-btn" style="margin:10px 0 16px;background:#374151;" onclick="exportCalcCsv()">&#x1F4BE; CSV</button>';

  resDiv.innerHTML  = html;
  resDiv._xlsxData  = xlsxData;
  resDiv._month     = month;
  resDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function exportCalcXlsx() {
  var resDiv = document.getElementById('calc-results');
  if (!resDiv || !resDiv._xlsxData || typeof XLSX === 'undefined') {
    toast('Excel biblioteka neįkelta', 'err'); return;
  }
  var wb = XLSX.utils.book_new();
  var ws = XLSX.utils.aoa_to_sheet(resDiv._xlsxData);
  /* merge grouped room headers */
  if (!ws['!merges']) ws['!merges'] = [];
  var rLen = ROOM_NAMES.length;
  /* row 0 (hdr1): merge Butas..K.V.EUR then each room name spans 3 cols */
  var col = 5;
  for (var i = 0; i < rLen; i++) {
    ws['!merges'].push({ s:{r:0,c:col}, e:{r:0,c:col+2} });
    col += 3;
  }
  /* row 0: also merge last 3 single-col headers vertically */
  ws['!merges'].push({ s:{r:0,c:0}, e:{r:1,c:0} });
  ws['!merges'].push({ s:{r:0,c:1}, e:{r:1,c:1} });
  ws['!merges'].push({ s:{r:0,c:2}, e:{r:1,c:2} });
  ws['!merges'].push({ s:{r:0,c:3}, e:{r:1,c:3} });
  ws['!merges'].push({ s:{r:0,c:4}, e:{r:1,c:4} });
  var lastCols = 5 + rLen * 3;
  ws['!merges'].push({ s:{r:0,c:lastCols},   e:{r:1,c:lastCols} });
  ws['!merges'].push({ s:{r:0,c:lastCols+1}, e:{r:1,c:lastCols+1} });
  ws['!merges'].push({ s:{r:0,c:lastCols+2}, e:{r:1,c:lastCols+2} });
  XLSX.utils.book_append_sheet(wb, ws, 'Elektra');
  XLSX.writeFile(wb, 'elektra_' + resDiv._month + '.xlsx');
  toast('Excel eksportuotas!', 'ok');
}

function exportCalcCsv() {
  var resDiv = document.getElementById('calc-results');
  if (!resDiv || !resDiv._xlsxData) return;
  exportCsv(resDiv._xlsxData, 'elektra_' + resDiv._month);
}

/* ── CSV EXPORT ───────────────────────────────────── */
function exportCsv(rows, month) {
  var csv  = rows.map(function(r) {
    return r.map(function(c) {
      return '"' + String(c == null ? '' : c).replace(/"/g, '""') + '"';
    }).join(';');
  }).join('\r\n');
  var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = 'skaitikliai_' + month + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('CSV eksportuotas!', 'ok');
}
</script>
